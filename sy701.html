  {q:"WannaCry spread between systems with no user interaction by exploiting an SMB vulnerability. Which malware type is this?",o:["Trojan","Worm","Rootkit","Logic bomb"],c:1,e:"Self-replicating, spreads via network without user action = worm.",t:"Malware",s:"2.4"},
  {q:"A malicious payload activates only when a specific HR record is deleted. Which malware type is this?",o:["Worm","Logic bomb","Rootkit","Spyware"],c:1,e:"Triggered by a specific condition (date, event) = logic bomb. Common insider threat technique.",t:"Malware",s:"2.4"},
  {q:"An incident responder finds the Windows event log was cleared at 02:14 with no preceding admin logon recorded. This IoC is BEST described as:",o:["Account lockout","Missing logs","Resource consumption","Impossible travel"],c:1,e:"Absence of expected log entries is itself an indicator - attackers clear logs to cover tracks.",t:"IoC",s:"2.4"},
  {q:"An attacker captures an NTLM hash from memory and replays it to authenticate without knowing the cleartext password. Which attack is this?",o:["Brute force","Pass-the-Hash / replay","Dictionary attack","Birthday attack"],c:1,e:"Replaying captured credentials = pass-the-hash / credential replay.",t:"Network Attacks",s:"2.4"},
  {q:"An attacker spoofs the source IP of small DNS queries to open resolvers, which return large responses to the victim. What is this attack called?",o:["DNS poisoning","Amplified / reflected DDoS","On-path","SSL stripping"],c:1,e:"DNS amplification: small query, large reply, spoofed source = victim is flooded.",t:"Network Attacks",s:"2.4"},
  {q:"A user's CPU is pinned at 100% with sustained outbound network traffic to an unfamiliar pool. The user is on vacation. Which IoC fits BEST?",o:["Impossible travel","Resource consumption + out-of-cycle activity","Account lockout","Missing logs"],c:1,e:"Sudden resource spike with no business cause and out-of-cycle timing = strong IoC for cryptominer or exfiltration.",t:"IoC",s:"2.4"},
  {q:"Which malware type is specifically designed to hide itself at the kernel level and intercept OS system calls?",o:["Rootkit","Worm","Trojan","Keylogger"],c:0,e:"Rootkits operate at kernel level, hiding themselves and other malware by intercepting syscalls.",t:"Malware",s:"2.4"},
  {q:"Which attack forces a TLS connection to fall back from TLS 1.3 to SSL 3.0 to exploit weaker ciphers?",o:["Replay attack","Downgrade attack","Birthday attack","Side channel"],c:1,e:"Forcing negotiation to a weaker protocol = downgrade attack (e.g., POODLE).",t:"Password/Crypto Attacks",s:"2.4"},

  // ─── 2.5 Mitigation Techniques ──────────────────────────────────────────────
  {q:"A company wants to limit the blast radius of a ransomware infection on the user VLAN so it cannot reach the database VLAN. Which mitigation BEST achieves this?",o:["Application allow list","Network segmentation","Patching","HIPS"],c:1,e:"Segmentation (VLANs, firewalls between zones) limits lateral movement after a breach.",t:"Core",s:"2.5"},
  {q:"Which mitigation MOST effectively prevents unknown malware from executing on workstations?",o:["Antivirus signatures","Application allow list","Deny list","Host firewall"],c:1,e:"Allow lists permit ONLY approved binaries - unknown malware cannot run, even without a signature.",t:"Core",s:"2.5"},
  {q:"A new IT contractor is granted only the specific shares and tools needed for their role. Which principle is being applied?",o:["Defense in depth","Least privilege","Zero trust","Segregation of duties"],c:1,e:"Least privilege grants the minimum access required for the role - prevents access creep.",t:"Core",s:"2.5"},
  {q:"Which of the following is the FIRST hardening action to take on a newly deployed network device?",o:["Patch the firmware","Change default credentials","Enable SNMP","Configure logging"],c:1,e:"Default creds are publicly documented; changing them is the very first hardening step.",t:"Hardening",s:"2.5"},
  {q:"A workstation laptop is stolen from a coffee shop. Which control BEST prevents data disclosure from the device?",o:["BIOS password","Full-disk encryption","Antivirus","Cable lock"],c:1,e:"FDE (BitLocker, FileVault, LUKS) makes the disk unreadable without the key.",t:"Hardening",s:"2.5"},
  {q:"A SOC wants to BLOCK unknown process behavior in real time on every endpoint, not just detect it. Which tool BEST fits?",o:["IDS","HIPS / EDR","SIEM","Vulnerability scanner"],c:1,e:"Host-based IPS / EDR can block in real time. IDS only alerts; SIEM correlates.",t:"Hardening",s:"2.5"},
  {q:"An organization automatically reverts any drift from its CIS-baseline configuration on Windows hosts. Which mitigation is being applied?",o:["Configuration enforcement","Patch management","Allow listing","DLP"],c:0,e:"Tools like GPO/MDM/Ansible continuously check and remediate drift from the secure baseline.",t:"Core",s:"2.5"},
  {q:"Which mitigation is BEST applied to a mission-critical legacy system that cannot be patched?",o:["Decommission immediately","Isolation in a restricted VLAN with extra monitoring","Disable logging to reduce noise","Skip vulnerability scans"],c:1,e:"When patching is not possible, compensating controls (isolation, monitoring) reduce exposure.",t:"Core",s:"2.5"},
  {q:"An admin closes Telnet (23), unused FTP (21), and HTTP (80) on a production web server. Which hardening principle does this BEST illustrate?",o:["Defense in depth","Attack surface reduction","Least privilege","Segregation of duties"],c:1,e:"Disabling unused ports/services reduces the attack surface - fewer entry points for attackers.",t:"Hardening",s:"2.5"},
  {q:"Which mitigation BEST helps prevent malware C2 communication after infection?",o:["DNS sinkholing","Full-disk encryption","Code signing","Allow list"],c:0,e:"DNS sinkholes redirect known C2 domains to a dead-end resolver, breaking malware command channels.",t:"Core",s:"2.5"},

  // ─── 3.1 Architecture Models ────────────────────────────────────────────────
  {q:"A company rents Linux VMs from AWS and is responsible for patching the OS, runtime, and application. Which cloud service model is in use?",o:["SaaS","PaaS","IaaS","FaaS"],c:2,e:"IaaS = customer manages OS upward. PaaS = runtime managed by provider; SaaS = full app managed.",t:"Cloud",s:"3.1"},
  {q:"In a SaaS model such as Microsoft 365, which area is ALWAYS the customer's responsibility?",o:["OS patching","Hypervisor security","Data and access configuration","Datacenter physical security"],c:2,e:"In SaaS, customer responsibilities are limited to data, identity, and access settings.",t:"Cloud",s:"3.1"},
  {q:"A SCADA-controlled water treatment plant is physically disconnected from corporate networks and the internet. Which architecture pattern is this?",o:["DMZ","Air-gapped","SDN","Hybrid cloud"],c:1,e:"Air-gapped = zero physical or logical connection to external networks; only attack vector is physical access.",t:"Network",s:"3.1"},
  {q:"Which technology BEST supports rapid micro-segmentation changes by separating control and data planes?",o:["VLAN","SD-WAN","SDN","NAT"],c:2,e:"Software-Defined Networking centralizes routing decisions in software, enabling fast policy changes.",t:"Network",s:"3.1"},
  {q:"An IoT thermostat manufacturer has not patched a known firmware CVE in two years. Which compensating control is MOST appropriate?",o:["Replace with desktop OS","Place on dedicated isolated VLAN","Disable HTTPS","Open the management port"],c:1,e:"Embedded/IoT devices that cannot be patched should be isolated on dedicated VLANs to limit exposure.",t:"Specialized Environments",s:"3.1"},
  {q:"Stuxnet specifically targeted programmable logic controllers managing centrifuges. Which type of system was compromised?",o:["RTOS aviation system","SCADA / ICS","Embedded mobile device","Air-gapped backup"],c:1,e:"Stuxnet targeted SCADA-managed industrial control systems for centrifuge sabotage.",t:"Specialized Environments",s:"3.1"},
  {q:"A company defines all its AWS resources in Terraform stored in Git. Which architecture pattern is being used?",o:["IaC","SDN","SOAR","CSPM"],c:0,e:"Infrastructure as Code expresses infra in version-controlled code - reproducible and auditable.",t:"Network",s:"3.1"},
  {q:"In an IaaS deployment, who is responsible for the hypervisor's security?",o:["The customer","The cloud provider","Both equally","Neither"],c:1,e:"Hypervisor and physical infrastructure are always provider responsibilities. Customer owns OS upward.",t:"Cloud",s:"3.1"},
  {q:"Which environment uses deterministic timing guarantees and is common in medical devices and avionics?",o:["RTOS","SaaS","DMZ","Container"],c:0,e:"Real-Time Operating Systems prioritize deterministic timing - used where late = wrong.",t:"Specialized Environments",s:"3.1"},
  {q:"A microservices application uses mTLS between every internal service. What threat does this BEST mitigate?",o:["Buffer overflow","Lateral on-path attacks between services","SQL injection","DoS amplification"],c:1,e:"Mutual TLS authenticates and encrypts inter-service traffic, preventing on-path attacks within the cluster.",t:"Network",s:"3.1"},

  // ─── 3.2 Securing Enterprise Infrastructure ─────────────────────────────────
  {q:"An IPS sits inline. If the device crashes and traffic must continue flowing UNINSPECTED, the device is configured to:",o:["Fail-closed","Fail-open","Fail-secure","Fail-stop"],c:1,e:"Fail-open = traffic passes through on failure (availability prioritized).",t:"Device Modes",s:"3.2"},
  {q:"Which placement BEST describes a passive IDS sensor?",o:["Inline on the WAN edge","Connected to a SPAN/mirror port","In front of every web server","Between user VLAN and DB VLAN"],c:1,e:"Passive IDSes receive copies of traffic via SPAN/mirror ports - they cannot block.",t:"Device Modes",s:"3.2"},
  {q:"A company wants ALL administrative access to internal servers to flow through a single audited entry point. Which is MOST appropriate?",o:["Forward proxy","Jump server / bastion","Reverse proxy","SD-WAN router"],c:1,e:"Jump servers (bastion hosts) are the single hardened administrative entry point with full audit.",t:"Network Appliances",s:"3.2"},
  {q:"Which firewall type identifies applications regardless of port and supports user-identity rules?",o:["Stateless packet filter","Stateful firewall","NGFW","UTM"],c:2,e:"Next-Generation Firewalls inspect Layer 7, identify apps, and integrate user identity.",t:"Firewall Types",s:"3.2"},
  {q:"Which IPSec mode encrypts and encapsulates the ENTIRE original packet and is appropriate for site-to-site VPNs?",o:["Transport","Tunnel","AH","GRE"],c:1,e:"Tunnel mode encrypts the whole packet and adds a new IP header - used for VPN gateways.",t:"Secure Communication",s:"3.2"},
  {q:"802.1X authenticates a device at the switch port BEFORE granting network access. Which protocol does the switch use to talk to the central authentication server?",o:["LDAP","RADIUS","HTTPS","SNMP"],c:1,e:"802.1X uses EAP between supplicant and authenticator (switch), with RADIUS to the auth server.",t:"Network Appliances",s:"3.2"},
  {q:"A security team places public-facing web and DNS servers between an external firewall and an internal firewall. What is this design called?",o:["Air-gap","Screened subnet (DMZ)","SD-WAN","SDN"],c:1,e:"A screened subnet (DMZ) isolates public-facing servers between two firewalls.",t:"Firewall Types",s:"3.2"},
  {q:"Which appliance BEST inspects HTTP/HTTPS for SQLi, XSS, and CSRF in front of web servers?",o:["NGFW","WAF","Stateful firewall","UTM"],c:1,e:"A Web Application Firewall understands HTTP/HTTPS and inspects request content for app-layer attacks.",t:"Firewall Types",s:"3.2"},
  {q:"A retailer wants cloud-delivered security (CASB, ZTNA, SWG) integrated with SD-WAN for its remote workforce. Which framework BEST describes this?",o:["IaaS","SASE","Hybrid cloud","DMZ"],c:1,e:"SASE = cloud-delivered security stack + SD-WAN, designed for remote and cloud-first orgs.",t:"Secure Communication",s:"3.2"},
  {q:"Which IPSec component provides encryption AND integrity for the payload?",o:["AH","ESP","IKE","GRE"],c:1,e:"ESP provides confidentiality, integrity, and authentication. AH provides only integrity/auth.",t:"Secure Communication",s:"3.2"},

  // ─── 3.3 Data Protection ────────────────────────────────────────────────────
  {q:"Which data state is BEST protected by TLS 1.2+ (HTTPS, SFTP, LDAPS)?",o:["At rest","In transit","In use","Archived"],c:1,e:"Data in transit moves over networks and is protected via transport-layer encryption.",t:"Data States",s:"3.3"},
  {q:"To protect sensitive data while it is being processed in CPU/RAM, which technology is MOST appropriate?",o:["Full-disk encryption","TLS","Secure enclave / memory encryption","SHA-256 hashing"],c:2,e:"Data in use is protected by secure enclaves (SGX, Apple Secure Enclave) and memory encryption.",t:"Data States",s:"3.3"},
  {q:"A US-headquartered SaaS provider stores EU customer data on servers in Germany. Which concept does this MOST directly address?",o:["Tokenization","Data sovereignty / residency","Data masking","Geofencing"],c:1,e:"Data sovereignty: physical location of data determines which country's laws apply.",t:"Data States",s:"3.3"},
  {q:"A retailer replaces stored PANs with random tokens; the real PANs live in a secured vault. Which method is in use?",o:["Encryption","Hashing","Tokenization","Steganography"],c:2,e:"Tokenization replaces sensitive values with non-sensitive tokens - standard for PCI DSS scope reduction.",t:"Protection Methods",s:"3.3"},
  {q:"A developer needs realistic data in a test environment but cannot use production PII. Which method BEST allows this?",o:["TLS","Data masking","HSM","Hashing"],c:1,e:"Data masking shows partial or fictionalized data (e.g., ***-**-6789) for non-prod use.",t:"Protection Methods",s:"3.3"},
  {q:"Which data classification typically applies to PHI under HIPAA or PAN under PCI DSS?",o:["Public","Internal","Confidential","Regulated"],c:3,e:"Regulated data is governed by specific compliance frameworks (HIPAA, PCI DSS, GDPR).",t:"Classifications",s:"3.3"},
  {q:"Which classification is appropriate for a company's published quarterly press release?",o:["Public","Internal","Confidential","Restricted"],c:0,e:"Press releases are intended for public distribution.",t:"Classifications",s:"3.3"},
  {q:"Which control BEST enforces that customer data is only accessible from inside the country where it must legally remain?",o:["Hashing","Geographic / geolocation restriction","Tokenization","TLS"],c:1,e:"Geographic restrictions enforce residency and access-by-location requirements.",t:"Protection Methods",s:"3.3"},
  {q:"Which classification BEST fits an internal organization chart that should not be shared externally but is not highly sensitive?",o:["Public","Internal/Private","Restricted","Regulated"],c:1,e:"Internal/Private = not for external distribution but not highly sensitive.",t:"Classifications",s:"3.3"},
  {q:"Which solution BEST protects laptops storing confidential data if the laptop is stolen?",o:["Hashing files with SHA-256","Full-disk encryption","Cable lock","Data masking"],c:1,e:"FDE renders the disk unusable without the key - the standard control for lost/stolen devices.",t:"Protection Methods",s:"3.3"},

  // ─── 3.4 Resilience & Recovery ──────────────────────────────────────────────
  {q:"A trading platform must resume operations within minutes of a regional outage. Which site type is MOST appropriate?",o:["Cold site","Warm site","Hot site","Air-gapped site"],c:2,e:"Hot sites are fully operational duplicates with real-time replication - minutes to failover.",t:"Site & HA",s:"3.4"},
  {q:"An organization can tolerate at most 2 hours of data loss. Which metric does this BEST describe?",o:["RTO","RPO","MTTR","MTBF"],c:1,e:"RPO = maximum acceptable data loss measured in time. Drives backup frequency.",t:"Recovery Objectives",s:"3.4"},
  {q:"SLE = $50,000 and ARO = 0.2. What is the ALE?",o:["$10,000","$50,000","$250,000","$2,500"],c:0,e:"ALE = SLE × ARO = $50,000 × 0.2 = $10,000.",t:"Recovery Objectives",s:"3.4"},
  {q:"Which site type provides only space, power, and network - no equipment?",o:["Hot","Warm","Cold","Active-active"],c:2,e:"Cold sites are space-only; days or weeks to bring up hardware. Cheapest option.",t:"Site & HA",s:"3.4"},
  {q:"An organization wants to ensure backups survive ransomware encrypting the production storage AND a fire at the primary site. Which approach BEST satisfies BOTH?",o:["Daily snapshots on the same SAN","Replication to a sister rack","Offsite backup following the 3-2-1 rule","Backup encryption only"],c:2,e:"3-2-1 rule (3 copies, 2 media types, 1 offsite) addresses both ransomware and physical disaster.",t:"Backup",s:"3.4"},
  {q:"A backup admin uses real-time replication to a DR site. Which threat does replication NOT directly defend against?",o:["Hard drive failure","Datacenter fire","Ransomware (deletions replicate)","Power loss at primary"],c:2,e:"Replication mirrors deletions and corruption - alone it is not a ransomware defense.",t:"Backup",s:"3.4"},
  {q:"Which metric BEST measures average time to FIX a failure once detected?",o:["MTTR","MTBF","RTO","RPO"],c:0,e:"Mean Time To Repair = average time from detection to restoration.",t:"Recovery Objectives",s:"3.4"},
  {q:"An organization spreads its primary and DR datacenters across two different regions over 1,000 km apart. Which design principle is being applied?",o:["Platform diversity","Geographic dispersion","Active-active","Cold standby"],c:1,e:"Geographic dispersion ensures a regional disaster does not affect both sites.",t:"Site & HA",s:"3.4"},
  {q:"A UPS provides which of the following?",o:["Multi-day power for sustained outages","Minutes of clean power for graceful shutdown / generator startup","Lightning surge ground","Network failover"],c:1,e:"UPS = battery backup; minutes of clean power. Generators handle longer outages.",t:"Backup",s:"3.4"},
  {q:"Which load balancing approach has all nodes actively serving traffic, providing both HA and added throughput?",o:["Active-passive","Active-active","Cold standby","Round-robin DNS only"],c:1,e:"Active-active distributes traffic across all nodes; failure reduces capacity but not availability.",t:"Site & HA",s:"3.4"},

  // ─── 4.1 Security Techniques for Computing Resources ───────────────────────
  {q:"Which Wi-Fi protocol uses SAE to defeat offline dictionary attacks against captured handshakes?",o:["WPA2-Personal","WPA3-Personal","WEP","WPA2-Enterprise"],c:1,e:"WPA3 SAE replaces the 4-way handshake - captured handshakes can no longer be brute-forced offline.",t:"Wireless & Mobile",s:"4.1"},
  {q:"An enterprise wants per-user Wi-Fi authentication where access can be revoked individually without changing a shared key. Which is BEST?",o:["WPA2-Personal","WPA3-Personal with PSK","WPA2/WPA3-Enterprise (802.1X)","Open with captive portal"],c:2,e:"Enterprise mode uses 802.1X + RADIUS, giving each user individual credentials and revocation.",t:"Wireless & Mobile",s:"4.1"},
  {q:"A developer relies only on JavaScript form validation in the browser. Which weakness does this introduce?",o:["TLS downgrade","Trivial bypass via proxy / DevTools","CSRF","Smishing"],c:1,e:"Client-side validation is for UX only. Server-side validation MUST be authoritative.",t:"Application",s:"4.1"},
  {q:"Which web cookie flag prevents JavaScript from reading the cookie, mitigating XSS-based theft?",o:["Secure","HttpOnly","SameSite","Domain"],c:1,e:"HttpOnly blocks document.cookie access - defeats XSS-based session theft.",t:"Application",s:"4.1"},
  {q:"Which technique prevents a tampered application installer from running on a user's machine?",o:["Sandboxing","Code signing","Input validation","DLP"],c:1,e:"Code signing lets the OS verify the publisher's signature before execution - detects tampering.",t:"Application",s:"4.1"},
  {q:"Which mobile deployment model gives the organization the MOST control while still allowing personal use?",o:["BYOD","COPE","CYOD","Air-gap"],c:1,e:"Corporate-Owned, Personally-Enabled: org owns and fully controls the device; user can also use personally.",t:"Wireless & Mobile",s:"4.1"},
  {q:"Which testing method finds vulnerabilities by sending real attack payloads to a running application?",o:["SAST","DAST","SCA","Threat modeling"],c:1,e:"DAST is dynamic - exercises the running app and finds runtime/logic issues SAST misses.",t:"Application",s:"4.1"},
  {q:"Which configuration baseline is COMMONLY used as the starting point for hardening Windows, Linux, and cloud platforms?",o:["NIST 800-61","CIS Benchmarks","ISO 9001","SOC 2"],c:1,e:"CIS Benchmarks are the de facto free hardening baselines for major OSes and cloud platforms.",t:"Secure Baselines",s:"4.1"},
  {q:"An untrusted browser-downloaded executable is run in an isolated container so it cannot reach the OS, network, or other processes. Which technique is in use?",o:["Allow listing","Sandboxing","Code signing","Tokenization"],c:1,e:"Sandboxing isolates suspect code so it cannot affect the rest of the system.",t:"Application",s:"4.1"},
  {q:"Which wireless deployment is MOST vulnerable to offline dictionary attacks against the PSK if a 4-way handshake is captured?",o:["WPA3-Personal","WPA2-Personal","WPA2-Enterprise","WPA3-Enterprise"],c:1,e:"WPA2-Personal's 4-way handshake is captureable and the PSK can be brute-forced offline.",t:"Wireless & Mobile",s:"4.1"},

  // ─── 4.2 Asset Management ───────────────────────────────────────────────────
  {q:"A retired SSD contained sensitive customer data. Which sanitization method is MOST appropriate before reuse of the device?",o:["Degaussing","Software overwriting","Cryptographic erasure","Physical shredding"],c:2,e:"Crypto-erase deletes the encryption key; data is unreadable. SSDs' wear leveling makes overwriting unreliable.",t:"Disposal",s:"4.2"},
  {q:"An organization must prove to auditors how each retired drive was sanitized. Which document supports this?",o:["AUP","Certification of disposal","SLA","MOU"],c:1,e:"A certification records method, date, asset SN, and tech - required for HIPAA/PCI/SOX audits.",t:"Disposal",s:"4.2"},
  {q:"Which sanitization method renders magnetic media inoperable for reuse?",o:["Cryptographic erasure","Degaussing","Overwriting","Format"],c:1,e:"Degaussing destroys data via strong magnetic fields and renders the drive unusable. Useless on SSDs.",t:"Disposal",s:"4.2"},
  {q:"Which step in the asset lifecycle BEST helps an organization 'protect what it has'?",o:["Acquisition","Assignment / accounting in CMDB","Sanitization","Decommission"],c:1,e:"You can't protect what you don't know you own - accurate asset assignment and CMDB tracking is foundational.",t:"Lifecycle",s:"4.2"},
  {q:"Which method is the HIGHEST-assurance disposal technique for top-secret media that will NOT be reused?",o:["Degaussing","Crypto-erasure","Physical destruction (shred / incinerate)","Software overwriting"],c:2,e:"Physical destruction provides the highest assurance and is required for TS/SCI media not being reused.",t:"Disposal",s:"4.2"},
  {q:"Which sanitization method is COMPLETELY ineffective on SSDs and flash media?",o:["Cryptographic erasure","Physical destruction","Degaussing","Vendor secure-erase"],c:2,e:"Degaussing relies on magnetic fields and does nothing to flash storage.",t:"Disposal",s:"4.2"},
  {q:"Under HIPAA, financial / patient records typically must be retained for at least how long?",o:["1 year","6 years","20 years","Forever"],c:1,e:"HIPAA requires roughly 6 years of retention for documentation of policies, procedures, and certain records.",t:"Disposal",s:"4.2"},
  {q:"Which tool BEST helps an organization continuously discover all assets currently on its network?",o:["DLP","Network scanner (Nmap, Qualys)","Tokenization","WAF"],c:1,e:"Network scanners enumerate live hosts and services - required for asset discovery.",t:"Lifecycle",s:"4.2"},
  {q:"During acquisition of a new shipment of network appliances, which check is MOST important to detect supply chain tampering?",o:["Validate firmware hash and tamper-evident seals","Run a SQL injection test","Check the AUP","Run an external pentest"],c:0,e:"Tamper-evident packaging and validated firmware hashes detect supply chain tampering at acquisition.",t:"Lifecycle",s:"4.2"},
  {q:"Which method is FASTEST and MOST appropriate for sanitizing a self-encrypting SSD before reuse?",o:["Physical destruction","Crypto-erase via key destruction","7-pass overwrite","Degaussing"],c:1,e:"Self-encrypting SSDs allow instant crypto-erase - destroy the key, data becomes unrecoverable.",t:"Disposal",s:"4.2"},

  // ─── 4.3 Vulnerability Management ───────────────────────────────────────────
  {q:"A scanner reports a vulnerability that does not actually exist on the system. This is a:",o:["False negative","False positive","True positive","Critical finding"],c:1,e:"False positive = scanner reports vuln that isn't actually exploitable. False negatives are MORE dangerous.",t:"Analysis",s:"4.3"},
  {q:"Which scan type provides the MOST thorough view of installed software, missing patches, and config issues?",o:["Non-credentialed","Credentialed scan","External port scan","Passive recon"],c:1,e:"Credentialed scans authenticate and read installed versions, configs, and patch state directly.",t:"Identification",s:"4.3"},
  {q:"Which factor adds the MOST weight to prioritizing a CVSS 7.5 vulnerability for remediation?",o:["It exists on an internal print server","Public PoC code is available and the asset is internet-facing","No compensating control documented","It was found six months ago"],c:1,e:"Public exploit availability + internet exposure + asset criticality drive prioritization beyond raw CVSS.",t:"Analysis",s:"4.3"},
  {q:"A patch is applied to remediate a critical vulnerability. What is the MOST important next step?",o:["Close the ticket immediately","Rescan to confirm the fix","Update the AUP","Notify the CAB"],c:1,e:"Always rescan after remediation - assumed fixes that didn't take are a common source of exposure.",t:"Response",s:"4.3"},
  {q:"Which option is MOST appropriate when a vulnerability cannot be patched due to legacy operational constraints?",o:["Ignore it","Apply compensating controls (isolation, virtual patch)","Disable logging","Increase user privileges"],c:1,e:"Compensating controls (network isolation, WAF rules, monitoring) reduce risk when patching isn't feasible.",t:"Response",s:"4.3"},
  {q:"Which catalog should a public-sector security team prioritize ABOVE generic CVSS scoring?",o:["NVD","CISA Known Exploited Vulnerabilities (KEV)","ATT&CK","NIST 800-53"],c:1,e:"CISA KEV lists vulns actively being exploited; binding directive for federal agencies, used widely elsewhere.",t:"Response",s:"4.3"},
  {q:"Which technique identifies vulnerable open-source libraries deep in an application's dependency tree?",o:["DAST","SCA (Software Composition Analysis)","Pentest","SIEM"],c:1,e:"SCA tools enumerate dependencies and flag known-vulnerable versions (e.g., Log4j several layers deep).",t:"Identification",s:"4.3"},
  {q:"Which is the GREATEST risk associated with a false negative in a vulnerability scan?",o:["Wasted analyst time","Unfixed exploitable vulnerability remains hidden","Over-reporting of issues","Excessive ticket volume"],c:1,e:"False negatives create silent blind spots - far more dangerous than false positives.",t:"Analysis",s:"4.3"},
  {q:"What is the PRIMARY purpose of a bug bounty program?",o:["Replace internal pentests","Pay external researchers to responsibly disclose vulnerabilities","Audit financial controls","Generate compliance reports"],c:1,e:"Bug bounties incentivize external researchers to disclose vulns through structured channels.",t:"Identification",s:"4.3"},
  {q:"Which document grants formal, time-limited deviation from the patching policy with documented risk acceptance?",o:["Exception","Exemption","Waiver of liability","SLA"],c:0,e:"Exception = temporary deviation with expiration. Exemption = permanent (requires exec sign-off).",t:"Response",s:"4.3"},

  // ─── 4.4 Alerting & Monitoring ──────────────────────────────────────────────
  {q:"A SOC wants to correlate logon failures across firewalls, servers, and identity providers to detect spraying attacks. Which platform is MOST appropriate?",o:["IDS","SIEM","DLP","WAF"],c:1,e:"SIEMs centralize logs and run correlation rules across all sources to surface multi-source patterns.",t:"SIEM",s:"4.4"},
  {q:"Which network telemetry source provides connection METADATA (source/dest, ports, bytes, duration) but NOT packet contents?",o:["PCAP","NetFlow / IPFIX","SNMP traps","DNS logs"],c:1,e:"NetFlow/IPFIX captures flow records - who talked to whom and how much, not the payload.",t:"Network Monitoring",s:"4.4"},
  {q:"A regulator requires daily review of full packet capture for a payment system. Which is the MAIN drawback of relying on PCAP?",o:["Lacks payload data","Storage cost and privacy","Cannot detect SQLi","Encrypted only"],c:1,e:"PCAP is storage-heavy (~100 GB/hr at 1 Gbps) and raises privacy concerns on monitored networks.",t:"Network Monitoring",s:"4.4"},
  {q:"Which tool BEST detects unknown malware behavior on endpoints by analyzing process behavior rather than signatures?",o:["Antivirus","EDR","Network firewall","DLP"],c:1,e:"EDR uses behavioral analysis and telemetry - far more effective against zero-days than signature AV.",t:"DLP/AV/EDR",s:"4.4"},
  {q:"A SOC analyst is overwhelmed by alerts that are mostly benign. Which approach BEST addresses alert fatigue?",o:["Disable detection","Tune correlation rules and add context","Increase alert thresholds across the board","Move all alerts to email"],c:1,e:"Tuning correlation rules with context (whitelists, schedules) reduces noise without losing visibility.",t:"SIEM",s:"4.4"},
  {q:"An outbound DLP rule blocks an email containing patterns matching SSNs or credit card numbers. Where is the rule MOST likely enforced?",o:["Endpoint DLP","Network DLP at the email/web gateway","WAF","SIEM"],c:1,e:"Outbound network DLP at the gateway scans email and web uploads for sensitive data patterns.",t:"DLP/AV/EDR",s:"4.4"},
  {q:"Which protocol is COMMONLY used by network devices to push threshold-exceeded alerts to a management server on UDP 162?",o:["SNMP traps","Syslog","NetFlow","TLS"],c:0,e:"SNMP traps use UDP 162 to push asynchronous alerts to NMS systems.",t:"Network Monitoring",s:"4.4"},
  {q:"Which telemetry is MOST useful for detecting C2 beaconing (regular small outbound connections)?",o:["DLP","NetFlow","File integrity monitoring","Antivirus signatures"],c:1,e:"NetFlow shows periodic small outbound connections to the same destination - classic beacon pattern.",t:"Network Monitoring",s:"4.4"},
  {q:"A security baseline requires automated checks for missing patches and config drift across the fleet. Which standard supports this?",o:["SAML","SCAP","RADIUS","OAuth"],c:1,e:"SCAP standardizes vulnerability and compliance checking via OVAL, CCE, and XCCDF.",t:"SIEM",s:"4.4"},
  {q:"An endpoint DLP agent prevents a user from copying confidential files to a USB drive even when off-network. Which deployment model is in use?",o:["Network DLP","Endpoint DLP","Cloud DLP","Email DLP"],c:1,e:"Endpoint DLP enforces policies on the device itself, regardless of network location.",t:"DLP/AV/EDR",s:"4.4"},

  // ─── 4.5 Modify Enterprise Capabilities ────────────────────────────────────
  {q:"Which DNS record type publishes the IP addresses authorized to send email on behalf of a domain?",o:["DKIM","SPF","DMARC","MX"],c:1,e:"SPF is a TXT record listing authorized sending IPs.",t:"Email",s:"4.5"},
  {q:"Which email security mechanism cryptographically signs the message so the receiver can verify it was not modified in transit?",o:["SPF","DKIM","DMARC","S/MIME only"],c:1,e:"DKIM signs the message with a private key; the receiver validates with the published public key.",t:"Email",s:"4.5"},
  {q:"DMARC tells receiving servers what to do when SPF or DKIM fail. Which p= policy BEST blocks unauthorized senders?",o:["p=none","p=quarantine","p=reject","p=monitor"],c:2,e:"p=reject instructs receivers to bounce failing messages - the strongest policy after monitoring.",t:"Email",s:"4.5"},
  {q:"Which Linux mechanism enforces mandatory access control labels on every process and file?",o:["sudo","SELinux","iptables","chmod"],c:1,e:"SELinux applies MAC via security contexts - access only allowed if labels permit.",t:"OS Security",s:"4.5"},
  {q:"Which Windows feature centrally pushes security configuration to all domain-joined computers?",o:["AD CS","GPO","WSUS","BitLocker"],c:1,e:"Group Policy Objects centrally enforce password policy, screen lock, firewall, USB restrictions, etc.",t:"OS Security",s:"4.5"},
  {q:"A NAC solution checks whether an endpoint is patched and AV-running before allowing full network access. What is this called?",o:["Posture assessment","Federation","Captive portal","SAML assertion"],c:0,e:"Posture assessment validates endpoint hygiene before granting access; non-compliant goes to quarantine VLAN.",t:"OS Security",s:"4.5"},
  {q:"Which technology hashes critical system files on a schedule and alerts on unexpected changes?",o:["DLP","File Integrity Monitoring (FIM)","SIEM","HIPS"],c:1,e:"FIM (Tripwire, AIDE) detects unauthorized changes - useful against rootkits and ransomware.",t:"OS Security",s:"4.5"},
  {q:"A security team baselines normal user activity to detect bulk file downloads or unusual hours. Which capability is in use?",o:["UBA / UEBA","WAF","SPF","NAC"],c:0,e:"User Behavior Analytics baselines normal behavior per user and alerts on anomalies.",t:"OS Security",s:"4.5"},
  {q:"Which DEPLOYMENT order is BEST when implementing the email security triad?",o:["DMARC reject → SPF → DKIM","SPF → DKIM → DMARC monitor → tighten","DKIM → DMARC reject → SPF","Only DMARC is needed"],c:1,e:"Best practice: SPF first → DKIM → DMARC p=none → tighten to quarantine → reject.",t:"Email",s:"4.5"},
  {q:"Which capability BEST blocks malicious domain resolution at the network egress, preventing endpoints from reaching known C2 infrastructure?",o:["WAF","DNS filtering","Email DLP","HIDS"],c:1,e:"DNS filtering blocks malicious domains at resolution time - fast and lightweight.",t:"Web/DNS Filtering",s:"4.5"},

  // ─── 4.6 IAM ───────────────────────────────────────────────────────────────
  {q:"A government system labels every file Top Secret / Secret / Confidential and restricts users by clearance. Which access control model is in use?",o:["DAC","MAC","RBAC","ABAC"],c:1,e:"MAC uses security labels enforced by the system - users cannot change permissions on their own files.",t:"Access Control",s:"4.6"},
  {q:"In a large enterprise, permissions are granted to roles like 'Accountant' and 'Auditor', and users are assigned to roles. Which model is this?",o:["MAC","DAC","RBAC","Rule-based"],c:2,e:"Role-Based Access Control: assign permissions to roles, users to roles. Enterprise standard.",t:"Access Control",s:"4.6"},
  {q:"Access decisions evaluate Department=Finance AND Clearance=Level3 AND Time=BusinessHours. Which model is in use?",o:["MAC","RBAC","ABAC","DAC"],c:2,e:"Attribute-Based Access Control combines multiple attributes per request - most flexible.",t:"Access Control",s:"4.6"},
  {q:"Which protocol provides AUTHORIZATION (access tokens) without authenticating the user's identity on its own?",o:["SAML","OAuth 2.0","OIDC","Kerberos"],c:1,e:"OAuth 2.0 is an authorization framework. OIDC adds an identity layer on top.",t:"SSO",s:"4.6"},
  {q:"An enterprise web app receives a signed XML assertion from an IdP and grants access. Which protocol is in use?",o:["OAuth","SAML","RADIUS","LDAP"],c:1,e:"SAML uses signed XML assertions between IdP and Service Provider - common in enterprise SSO.",t:"SSO",s:"4.6"},
  {q:"A secure connection to a directory server should use port 636. Which protocol is this?",o:["LDAP","LDAPS","RADIUS","TACACS+"],c:1,e:"LDAPS = LDAP over TLS on port 636. Plain LDAP on 389 transmits credentials in cleartext.",t:"SSO",s:"4.6"},
  {q:"A user logs in with a password (knowledge) and approves a push notification on their phone (possession). This is BEST described as:",o:["Single-factor","Two-factor authentication","Federation","Privileged access management"],c:1,e:"Two distinct factor categories (something you know + something you have) = MFA / 2FA.",t:"MFA",s:"4.6"},
  {q:"Which authentication method is MOST resistant to phishing because no shared password ever exists?",o:["SMS one-time codes","TOTP app","FIDO2 / WebAuthn hardware key","Security questions"],c:2,e:"FIDO2 uses hardware-backed key pairs bound to the origin - phishing pages cannot use the credential.",t:"MFA",s:"4.6"},
  {q:"Which approach BEST eliminates standing administrative privileges?",o:["RBAC","Just-in-time (JIT) elevation with auto-revoke","Password rotation","DAC"],c:1,e:"JIT elevation grants admin rights for a specific task and time window, then revokes - no standing access.",t:"PAM",s:"4.6"},
  {q:"NIST SP 800-63B updated guidance now recommends prioritizing which password attribute?",o:["Forced 90-day rotation","Length over complexity","Mandatory special characters","Knowledge-based questions"],c:1,e:"NIST 800-63B emphasizes length over complexity and discourages forced periodic rotation.",t:"PAM",s:"4.6"},

  // ─── 4.7 Automation & Orchestration ────────────────────────────────────────
  {q:"A SOAR playbook automatically blocks a sender IP, quarantines the email, and disables the user when a phishing alert fires. Which BENEFIT is BEST illustrated?",o:["Cost reduction","Reaction time (millisecond response)","Compliance reporting","Asset discovery"],c:1,e:"Automation responds in milliseconds vs human minutes - critical during active breaches.",t:"Use Cases",s:"4.7"},
  {q:"An automated guardrail blocks creation of public S3 buckets in all AWS accounts. Which use case does this BEST illustrate?",o:["User provisioning","Guard rails","Threat hunting","Asset disposal"],c:1,e:"Guard rails are automated policies that prevent insecure configurations before they're created.",t:"Use Cases",s:"4.7"},
  {q:"Which is the GREATEST risk of relying on extensive automation for incident response?",o:["Slower mean time to respond","Loss of manual fallback when the automation fails","Reduced compliance","More analyst hiring"],c:1,e:"Single point of failure: if SOAR breaks, you must have documented manual fallbacks.",t:"Risks",s:"4.7"},
  {q:"Which automation use case BEST eliminates lingering access of terminated employees?",o:["Manual quarterly review","Auto-disable accounts triggered by HR system","Annual pentest","SOC dashboard"],c:1,e:"HR-triggered automated de-provisioning closes access immediately on termination - eliminates standing access.",t:"Use Cases",s:"4.7"},
  {q:"A misconfigured SOAR rule disables the entire finance department's accounts during business hours. Which automation risk is illustrated?",o:["Reaction time","Propagating mistakes at scale","Workforce multiplier","Compliance gap"],c:1,e:"Automation propagates mistakes instantly - testing thoroughly before deployment is critical.",t:"Risks",s:"4.7"},
  {q:"Which BENEFIT of automation BEST describes 'one analyst doing the work of a team'?",o:["Single point of failure","Workforce multiplier","Technical debt","Scope creep"],c:1,e:"Automation frees analysts for complex investigation - a force multiplier.",t:"Use Cases",s:"4.7"},
  {q:"Which integration mechanism is MOST commonly used for cross-tool security automation today?",o:["Manual ticketing","REST APIs","SNMP traps","FTP"],c:1,e:"Modern security tools expose REST APIs; SOAR platforms orchestrate them via API calls.",t:"Risks",s:"4.7"},
  {q:"Why is documenting and maintaining automation scripts important?",o:["So they look professional","To avoid technical debt and orphaned automation when staff turn over","To meet GDPR","To reduce SIEM costs"],c:1,e:"Undocumented scripts that 'just work' break when environments change - technical debt risk.",t:"Risks",s:"4.7"},
  {q:"Which user lifecycle activity is MOST commonly automated when a new hire is onboarded?",o:["Background check","Account creation with correct RBAC role","Office assignment","Pentest scheduling"],c:1,e:"User provisioning automation creates accounts with appropriate role-based permissions on hire.",t:"Use Cases",s:"4.7"},
  {q:"Which characteristic of automated incident response is MOST valuable during ransomware containment?",o:["Cost","Speed of containment","Aesthetics","Vendor neutrality"],c:1,e:"Ransomware spreads fast - automation can isolate hosts in seconds vs minutes for humans.",t:"Use Cases",s:"4.7"},

  // ─── 4.8 Incident Response ─────────────────────────────────────────────────
  {q:"A SOC analyst confirms ransomware on a server. Per NIST 800-61, what is the NEXT phase after Detection & Analysis?",o:["Recovery","Containment","Eradication","Lessons Learned"],c:1,e:"The order is Preparation → Detection → Containment → Eradication → Recovery → Lessons Learned.",t:"IR Process",s:"4.8"},
  {q:"During an active breach, which evidence MUST be collected FIRST per the order of volatility?",o:["Disk image","RAM / running processes","Backup tapes","Optical media"],c:1,e:"Order of volatility: CPU → RAM → network state → disk → optical. RAM is lost on reboot.",t:"Forensics",s:"4.8"},
  {q:"Which document tracks every person who handled a piece of evidence and prevents tampering claims?",o:["AUP","Chain of custody","Risk register","SOW"],c:1,e:"Chain of custody is required for evidence to be admissible in court.",t:"Forensics",s:"4.8"},
  {q:"A forensic analyst makes a bit-for-bit copy of a suspect drive and computes SHA-256 of the original BEFORE imaging. The NEXT step is MOST likely to:",o:["Investigate the original","Hash the image and verify it matches the original","Format the original","Encrypt the image"],c:1,e:"Hash the image and verify it matches original - proves no alteration during imaging. Always investigate the COPY.",t:"Forensics",s:"4.8"},
  {q:"Which device prevents any writes to a suspect drive during forensic acquisition?",o:["TPM","Write blocker","HSM","Sandbox"],c:1,e:"Write blockers (hardware or software) preserve evidence integrity by allowing reads only.",t:"Forensics",s:"4.8"},
  {q:"Which IR exercise is discussion-based and tests the team's KNOWLEDGE of the plan without touching production systems?",o:["Tabletop","Simulation","Red team","Threat hunt"],c:0,e:"Tabletop exercises walk through scenarios verbally; fast and inexpensive.",t:"Training",s:"4.8"},
  {q:"After eradication, which phase verifies the systems are clean and gradually returns them to production?",o:["Detection","Containment","Recovery","Lessons Learned"],c:2,e:"Recovery restores systems from clean backups, monitors for re-infection, and resumes operations.",t:"IR Process",s:"4.8"},
  {q:"What is the PRIMARY goal of root cause analysis after an incident?",o:["Discipline the responsible engineer","Identify the original cause and prevent recurrence","Generate compliance reports","Update the AUP"],c:1,e:"RCA finds the underlying cause (5 Whys) so you fix the source, not just symptoms.",t:"Training",s:"4.8"},
  {q:"During litigation, an organization is told to preserve all data relevant to a case. Which obligation does this trigger?",o:["GDPR right to erasure","Legal hold","SLA breach","Data sovereignty"],c:1,e:"Legal hold (litigation hold) suspends normal deletion to preserve evidence; failure = spoliation.",t:"Forensics",s:"4.8"},
  {q:"Why must containment occur BEFORE eradication?",o:["It reduces audit findings","To stop further spread before destroying evidence and rebuilding","It is faster","It bypasses the CAB"],c:1,e:"Containment limits damage; eradication afterward removes the threat. Reverse order can spread the breach.",t:"IR Process",s:"4.8"},

  // ─── 4.9 Investigation Data Sources ─────────────────────────────────────────
  {q:"Which data source BEST identifies an internal host repeatedly being blocked while attempting to reach an external known-bad IP?",o:["DNS logs","Firewall logs","Application logs","SNMP traps"],c:1,e:"Firewall logs record allow/deny decisions and reveal repeated blocks to a malicious destination.",t:"Log Sources",s:"4.9"},
  {q:"A host suddenly performs hundreds of DNS queries to random-looking domains in a short window. This pattern BEST indicates:",o:["Normal browsing","DGA-based malware reaching for C2","DDoS","SQL injection"],c:1,e:"Domain Generation Algorithm malware tries many random domains to reach C2 - visible in DNS logs.",t:"Network Telemetry",s:"4.9"},
  {q:"Which Windows event ID indicates a successful logon?",o:["4625","4624","4720","4688"],c:1,e:"4624 = successful logon. 4625 = failed logon. 4720 = account created. 4688 = process created.",t:"Log Sources",s:"4.9"},
  {q:"Which data source provides the FULL process tree on an endpoint, including what spawned what?",o:["NetFlow","DNS logs","EDR / endpoint logs","Firewall logs"],c:2,e:"EDR captures process trees, file changes, network connections per process - gold standard for endpoint investigation.",t:"Log Sources",s:"4.9"},
  {q:"Which network telemetry source allows reading credentials transmitted over plain HTTP?",o:["NetFlow","SNMP","PCAP (full packet capture)","DNS logs"],c:2,e:"PCAP captures full payloads - credentials in cleartext protocols can be read directly. Storage-heavy.",t:"Network Telemetry",s:"4.9"},
  {q:"An incident responder needs to know whether the photo attached to an email was taken at a specific GPS coordinate. Which data source helps MOST?",o:["Application logs","File metadata (EXIF)","Firewall logs","DNS logs"],c:1,e:"EXIF metadata in photos contains author, software, and GPS coordinates.",t:"Network Telemetry",s:"4.9"},
  {q:"A SOC analyst correlates an IDS alert against firewall logs to determine if the attack was actually blocked. Which BEST describes this approach?",o:["Threat hunting","Cross-source log correlation","Vulnerability management","Tabletop exercise"],c:1,e:"Combining log sources to validate detection-and-response alignment is core SIEM correlation work.",t:"Log Sources",s:"4.9"},
  {q:"Which log source BEST shows large outbound transfers consistent with data exfiltration?",o:["DNS logs","NetFlow","Application logs","Antivirus quarantine"],c:1,e:"NetFlow records bytes per flow - large outbound to unusual destinations is classic exfiltration signature.",t:"Network Telemetry",s:"4.9"},
  {q:"Which data source typically contains web server access details: client IP, URL, user-agent, response code?",o:["EDR","Application logs (Apache/nginx)","Firewall logs","SNMP traps"],c:1,e:"Web server access logs are application-layer logs.",t:"Log Sources",s:"4.9"},
  {q:"Which Windows event ID indicates an account was created?",o:["4624","4625","4720","4688"],c:2,e:"4720 = account created. Critical event for detecting attacker persistence via new accounts.",t:"Log Sources",s:"4.9"},

  // ─── 5.1 Security Governance ───────────────────────────────────────────────
  {q:"Which governance document is HIGH-LEVEL, mandatory, and signed off by executive leadership?",o:["Procedure","Standard","Policy","Guideline"],c:2,e:"Policies are mandatory high-level directives. Standards are specific, procedures are step-by-step, guidelines are optional.",t:"Documents",s:"5.1"},
  {q:"A document specifies that AES-256 must be used for at-rest encryption and TLS 1.2+ for transit. Which type of governance document is this?",o:["Policy","Standard","Procedure","Guideline"],c:1,e:"Standards are specific measurable requirements that derive from policy.",t:"Documents",s:"5.1"},
  {q:"Step-by-step instructions for how to enable BitLocker on a workstation are BEST classified as a:",o:["Policy","Standard","Procedure","Guideline"],c:2,e:"Procedures contain step-by-step instructions for performing specific tasks.",t:"Documents",s:"5.1"},
  {q:"Which document is RECOMMENDED but not mandatory?",o:["Policy","Standard","Procedure","Guideline"],c:3,e:"Guidelines are recommended best practices that may be ignored without policy violation.",t:"Documents",s:"5.1"},
  {q:"Under GDPR, which role determines the PURPOSE and MEANS of processing personal data?",o:["Data subject","Data processor","Data controller","Data steward"],c:2,e:"Controllers decide purpose/means; processors act on the controller's instructions.",t:"Data Roles",s:"5.1"},
  {q:"A cloud SaaS vendor processes its customer's data ONLY according to that customer's instructions. Under GDPR, the vendor is the:",o:["Data controller","Data processor","Data subject","Data owner"],c:1,e:"A processor handles data on behalf of a controller and must follow the controller's instructions.",t:"Data Roles",s:"5.1"},
  {q:"Who is typically the DATA OWNER for an organization's customer financial data?",o:["IT operations team","CFO or other business executive","Legal counsel","SOC analyst"],c:1,e:"Data owners are business executives who classify, set policy, and accept risk for their data.",t:"Data Roles",s:"5.1"},
  {q:"An IT department implements encryption, access controls, and backups as required by the data owner. Which role is IT performing?",o:["Data owner","Data steward / custodian","Data controller","Data subject"],c:1,e:"Custodians/stewards implement the technical controls the owner specifies; not accountable for the data.",t:"Data Roles",s:"5.1"},
  {q:"Which document defines what users may and may not do with corporate IT resources and is typically signed during onboarding?",o:["AUP","SLA","NDA","SOW"],c:0,e:"Acceptable Use Policy: defines acceptable use of company resources; signed at onboarding.",t:"Documents",s:"5.1"},
  {q:"Which governance body provides cross-functional input on policy and aligns security with business objectives?",o:["CAB","Security steering committee","Red team","CSIRT"],c:1,e:"Steering committees include IT, Legal, HR, Finance, Operations - they align security and business.",t:"Governance Structures",s:"5.1"},

  // ─── 5.2 Risk Management ────────────────────────────────────────────────────
  {q:"An asset is worth $200,000 and a flood is expected to destroy 50%. What is the SLE?",o:["$50,000","$100,000","$200,000","$400,000"],c:1,e:"SLE = Asset Value × Exposure Factor = $200,000 × 0.5 = $100,000.",t:"Formulas",s:"5.2"},
  {q:"SLE is $100,000 and ARO is 0.25. What is the ALE?",o:["$25,000","$100,000","$400,000","$2,500"],c:0,e:"ALE = SLE × ARO = $100,000 × 0.25 = $25,000.",t:"Formulas",s:"5.2"},
  {q:"A company purchases cyber insurance to offset financial impact of a breach. Which risk strategy is being applied?",o:["Risk acceptance","Risk transfer","Risk avoidance","Risk mitigation"],c:1,e:"Transfer = shift financial consequence to another party (insurance, vendor liability).",t:"Strategies",s:"5.2"},
  {q:"A company decides to outsource all credit card processing to a payment processor and never touch card data. Which risk strategy is this?",o:["Acceptance","Transfer","Avoidance","Mitigation"],c:2,e:"Avoidance: stop the risky activity entirely. (Transfer would still involve handling cards but with insurance.)",t:"Strategies",s:"5.2"},
  {q:"After implementing controls, residual risk is documented and signed off by an executive. Which strategy is being applied?",o:["Transfer","Avoidance","Acceptance","Mitigation"],c:2,e:"Risk acceptance = formally documenting and accepting the residual risk that remains after controls.",t:"Strategies",s:"5.2"},
  {q:"Which risk metric drives BACKUP FREQUENCY?",o:["RTO","RPO","MTTR","MTBF"],c:1,e:"RPO = max acceptable data loss measured in time. If RPO is 1 hour, you must back up at least hourly.",t:"BIA",s:"5.2"},
  {q:"Which risk metric drives the choice of HOT vs WARM vs COLD site?",o:["RTO","RPO","MTBF","MTTR"],c:0,e:"RTO = max acceptable downtime. Aggressive RTO requires hot/warm site; lax RTO allows cold.",t:"BIA",s:"5.2"},
  {q:"Which document is the LIVING tracker of all identified risks, owners, controls, and treatment plans?",o:["AUP","Risk register","SLA","SOW"],c:1,e:"Risk register: catalog of identified risks and treatment plans, continuously updated.",t:"BIA",s:"5.2"},
  {q:"An organization with conservative risk appetite would MOST likely:",o:["Accept higher risk for faster growth","Mitigate or avoid risks even at higher cost","Transfer all risks to insurance","Ignore residual risk"],c:1,e:"Conservative risk appetite favors stronger controls and lower risk tolerance, even at higher cost.",t:"Strategies",s:"5.2"},
  {q:"A team applies stronger encryption, MFA, and segmentation to reduce the likelihood and impact of a breach. Which strategy is this?",o:["Acceptance","Avoidance","Mitigation","Transfer"],c:2,e:"Mitigation = implement controls to reduce likelihood or impact. Most common strategy.",t:"Strategies",s:"5.2"},

  // ─── 5.3 Third-Party Risk ──────────────────────────────────────────────────
  {q:"Which contractual clause gives an organization the legal right to inspect a vendor's security controls?",o:["NDA","SLA","Right-to-audit","MSA"],c:2,e:"Right-to-audit clauses are essential - without them you have no recourse to verify vendor security.",t:"Assessment",s:"5.3"},
  {q:"Which agreement is MOST appropriate for guaranteeing 99.9% uptime with penalties for violation?",o:["MOU","SLA","NDA","BPA"],c:1,e:"Service Level Agreement defines measurable performance guarantees and penalties.",t:"Agreements",s:"5.3"},
  {q:"Which document is INTENDED to be non-binding and typically used between government agencies?",o:["SLA","MSA","MOU","SOW"],c:2,e:"Memorandum of Understanding documents intent without legal enforceability.",t:"Agreements",s:"5.3"},
  {q:"Which type of agreement is the UMBRELLA contract under which specific Statements of Work (SOWs) are executed?",o:["MOU","MSA","BPA","NDA"],c:1,e:"Master Service Agreement governs all future work; SOWs define specific deliverables underneath.",t:"Agreements",s:"5.3"},
  {q:"Which due-diligence artifact provides the STRONGEST third-party assurance over a 6-12 month period?",o:["SOC 2 Type I","SOC 2 Type II","Self-assessment","Vendor questionnaire"],c:1,e:"SOC 2 Type II evaluates whether controls actually OPERATED effectively over a period of time.",t:"Assessment",s:"5.3"},
  {q:"Which agreement BEST protects sensitive information shared during a vendor evaluation?",o:["MSA","NDA","SLA","MOU"],c:1,e:"NDA = legally binding confidentiality agreement, used during sensitive discussions.",t:"Agreements",s:"5.3"},
  {q:"Which agreement defines specific deliverables, timelines, and acceptance criteria for a project under an MSA?",o:["MOU","SOW","NDA","BPA"],c:1,e:"Statement of Work / Work Order: specific scope and deliverables under the MSA.",t:"Agreements",s:"5.3"},
  {q:"Which approach BEST reduces supply chain risk by mapping a vendor's own upstream vendors?",o:["AUP review","Supply chain analysis","Background check","Pentest"],c:1,e:"Supply chain analysis maps sub-processors and dependencies - SolarWinds-style cascades start there.",t:"Assessment",s:"5.3"},
  {q:"Which assessment principle requires that the assessor have NO financial interest in the outcome of the assessment?",o:["Right-to-audit","Independence / conflict-of-interest avoidance","Continuous monitoring","Privacy by design"],c:1,e:"Independence prevents biased outcomes; assessors should have no stake in the result.",t:"Assessment",s:"5.3"},
  {q:"A vendor refuses to provide a SOC 2 report and will not sign a right-to-audit clause. What is the MOST appropriate response?",o:["Sign anyway","Treat as a high-risk vendor and reconsider engagement","Skip due diligence","Outsource everything to them"],c:1,e:"Inability to verify vendor security is a major red flag; proceed only after risk acceptance at appropriate level.",t:"Assessment",s:"5.3"},

  // ─── 5.4 Security Compliance ───────────────────────────────────────────────
  {q:"Under GDPR, what is the breach notification timeframe to the supervisory authority?",o:["24 hours","72 hours","30 days","60 days"],c:1,e:"GDPR Article 33: notify supervisory authority within 72 hours of becoming aware of a breach.",t:"Frameworks",s:"5.4"},
  {q:"Maximum GDPR fines can reach which threshold?",o:["$1M","€500K","4% of global annual revenue or €20M","10% of US revenue"],c:2,e:"GDPR fines: up to 4% of global annual revenue or €20M, whichever is higher.",t:"Frameworks",s:"5.4"},
  {q:"PCI DSS applies to organizations that:",o:["Process EU citizen data","Store, process, or transmit cardholder data","Provide healthcare in the US","Are publicly traded"],c:1,e:"PCI DSS is contractually required for any org handling cardholder data.",t:"Frameworks",s:"5.4"},
  {q:"Which US law requires healthcare providers to protect PHI?",o:["GDPR","HIPAA","SOX","GLBA"],c:1,e:"HIPAA protects Protected Health Information for healthcare providers, insurers, and business associates.",t:"Frameworks",s:"5.4"},
  {q:"Which US law applies to PUBLICLY TRADED companies and requires accurate financial reporting + 7-year retention?",o:["HIPAA","SOX","PCI DSS","FERPA"],c:1,e:"Sarbanes-Oxley requires accurate financial reporting and IT controls around financial data.",t:"Frameworks",s:"5.4"},
  {q:"Under GDPR, an individual asks for their personal data to be deleted from all systems. Which right is being exercised?",o:["Right to access","Right to portability","Right to be forgotten (Article 17)","Right to object"],c:2,e:"Right to erasure / right to be forgotten allows individuals to request deletion of their data.",t:"Privacy",s:"5.4"},
  {q:"Which principle requires that data collection be minimized and protections built in from system design?",o:["Lawful basis","Privacy by design","Right to portability","Data sovereignty"],c:1,e:"Privacy by design: build privacy protections into systems from the start, not bolted on later.",t:"Privacy",s:"5.4"},
  {q:"Under GDPR, processing personal data requires which of the following?",o:["No legal basis required","A documented lawful basis (consent, contract, etc.)","An NDA only","Publicly traded status"],c:1,e:"GDPR requires a lawful basis for processing - consent, contract, legal obligation, vital interests, etc.",t:"Privacy",s:"5.4"},
  {q:"Which BEST describes due care?",o:["Investigating before signing a vendor contract","Ongoing reasonable security practices after agreeing to a relationship","Cyber insurance","Vendor pentest"],c:1,e:"Due care = ongoing reasonable practices. Due diligence = investigating BEFORE signing.",t:"Monitoring",s:"5.4"},
  {q:"Beyond regulatory fines, what is OFTEN the MOST costly consequence of a major breach?",o:["Patch deployment","Reputational damage and customer loss","Office space","Internal training"],c:1,e:"Brand damage, customer churn, and stock impact often exceed direct fines (Target 2013, Equifax).",t:"Monitoring",s:"5.4"},

  // ─── 5.5 Audits & Assessments ───────────────────────────────────────────────
  {q:"In a penetration test, the tester is given full network diagrams, source code, and credentials. Which engagement type is this?",o:["Black-box (unknown)","Gray-box (partially known)","White-box (known)","Red team"],c:2,e:"White-box (known environment) = tester has full information; tests depth, not discovery.",t:"Pentest",s:"5.5"},

// ─── QUESTION POOL HELPERS ────────────────────────────────────────────────────
function poolForScope(scope) {
  if (!scope || scope.type === 'full') return QUESTION_POOL;
  if (scope.type === 'domain') {
    const prefix = scope.domain.id + '.';
    return QUESTION_POOL.filter(q => q.s.startsWith(prefix));
  }
  if (scope.type === 'section') return QUESTION_POOL.filter(q => q.s === scope.section.id);
  return QUESTION_POOL;
}

function maxQuestionsFor(scope) {
  return poolForScope(scope).length;
}

function clampQuestionCount(value, scope, fallback=10) {
  const max = Math.max(1, maxQuestionsFor(scope));
  const parsed = parseInt(value, 10);
  if (!Number.isFinite(parsed)) return Math.min(fallback, max);
  return Math.max(1, Math.min(parsed, max));
}

function pickFromPool(scope, count) {
  const pool = poolForScope(scope);
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  const picked = shuffled.slice(0, Math.min(count, pool.length));
  return picked.map(q => ({
    question: q.q,
    options: q.o,
    correct: q.c,
    explanation: q.e,
    topic: q.t
  }));
}

          <Layers sz={18} cls={`${c.tx} mx-auto mb-2`}/>
          <div className="text-xs font-medium text-slate-100">Flashcards</div>
          <div className="text-[10px] text-slate-500 mt-0.5">{makeFlashcards({type:'section',section:sec,domain:d}).length} cards</div>
        </button>
        <button onClick={()=>toggleSection(sec.id)}
          className={`p-4 border rounded-lg transition text-center ${done?'border-emerald-500/40 bg-emerald-500/10':'border-slate-800 hover:border-slate-700'}`}>
          <Check2 sz={18} cls={`${done?'text-emerald-400':'text-slate-500'} mx-auto mb-2`}/>
          <div className="text-xs font-medium text-slate-100">{done?'Completed':'Mark Done'}</div>
          <div className="text-[10px] text-slate-500 mt-0.5">{done?'Click to undo':'Track progress'}</div>
        </button>
      </div>
    </div>
  );
}

function ExamBuilder({ setView }) {
  const [tab, setTab] = useState('quick');
  const [domains, setDomains] = useState(['1','2','3','4','5']);
  const [count, setCount] = useState(20);
  const [quickCounts, setQuickCounts] = useState({});
  const [expandedDomain, setExpandedDomain] = useState(null);

  const toggle = id => setDomains(prev => prev.includes(id) ? prev.filter(d=>d!==id) : [...prev,id]);
  const countKey = scope => scope.type === 'domain' ? `domain-${scope.domain.id}` : `section-${scope.section.id}`;
  const quickCount = (scope, fallback) => quickCounts[countKey(scope)] ?? String(Math.min(fallback, maxQuestionsFor(scope)));
  const setQuickCount = (scope, value) => setQuickCounts(prev => ({...prev, [countKey(scope)]: value}));
  const countInput = (scope, fallback) => {
    const max = maxQuestionsFor(scope);
    return (
      <input type="number" min="1" max={max} value={quickCount(scope, fallback)}
        onClick={e=>e.stopPropagation()}
        onChange={e=>setQuickCount(scope, e.target.value)}
        className="w-16 px-2 py-1.5 bg-slate-950/70 border border-slate-700 rounded text-xs font-mono text-slate-100 focus:outline-none focus:border-emerald-500/60"
        aria-label="Question count"/>
    );
  };

  const startCustom = () => {
    const scope = domains.length===5 ? {type:'full'} :
      domains.length===1 ? {type:'domain',domain:CURRICULUM.find(d=>d.id===domains[0])} :
      {type:'full'};
    const finalCount = clampQuestionCount(count, scope, 20);
    setCount(finalCount);
    setView({name:'exam',scope,count:finalCount});
  };

  const startSectionQuiz = (domain, section) => {
    const scope = {type:'section', section, domain};
    setView({name:'exam', scope, count:clampQuestionCount(quickCount(scope, 10), scope, 10)});
  };

  const startDomainQuiz = (domain) => {
    const scope = {type:'domain', domain};
    setView({name:'exam', scope, count:clampQuestionCount(quickCount(scope, 20), scope, 20)});

    <div className="max-w-2xl mx-auto px-4 py-8 space-y-5">
      <div>
        <div className="font-mono text-[10px] tracking-[0.3em] text-emerald-400/70 mb-2">// EXAM BUILDER</div>
        <h1 className="text-3xl font-bold text-slate-100">Practice Exams</h1>
        <p className="text-slate-400 mt-1 text-sm">Randomized practice questions in real CompTIA SY0-701 exam style - no API key required.</p>
      </div>

      {/* Tabs */}
      <div className="flex gap-1 p-1 bg-slate-900 border border-slate-800 rounded-lg">
        <button onClick={()=>setTab('quick')}
          className={`flex-1 py-2 rounded text-sm font-medium transition flex items-center justify-center gap-2 ${tab==='quick'?'bg-emerald-500 text-slate-950':'text-slate-400 hover:text-slate-200'}`}>
          <Zap sz={14}/> Quick Quiz
        </button>
        <button onClick={()=>setTab('custom')}
          className={`flex-1 py-2 rounded text-sm font-medium transition flex items-center justify-center gap-2 ${tab==='custom'?'bg-slate-700 text-slate-100':'text-slate-400 hover:text-slate-200'}`}>
          <Sparkle sz={14}/> Custom Exam
        </button>
      </div>

      {/* Quick Quiz Tab */}
      {tab==='quick' && (
        <div className="space-y-3">
          <p className="text-xs text-slate-500 font-mono">Pick a question count for any domain or section, then start that focused quiz.</p>
          {CURRICULUM.map(d => {
            const c = COLORS[d.color], I = d.Icon;
            const open = expandedDomain === d.id;
            const domainScope = {type:'domain', domain:d};
            return (
              <div key={d.id} className={`border ${c.bd} rounded-lg overflow-hidden`}>
                {/* Domain header row */}
                <div className={`flex items-center gap-3 p-3 ${c.bg} flex-wrap`}>
                  <I sz={16} cls={c.tx}/>
                  <div className="flex-1 min-w-0">
                    <span className={`font-mono text-[10px] ${c.tx} tracking-wider`}>{d.code}</span>
                    <span className="text-sm font-semibold text-slate-100 ml-2">{d.title}</span>
                  </div>
                  <div className="flex items-center gap-2 shrink-0">
                    <span className="font-mono text-[10px] text-slate-500">Q</span>
                    {countInput(domainScope, 20)}
                  </div>
                  <button onClick={()=>startDomainQuiz(d)}
                    className={`px-3 py-1.5 ${c.solid} text-slate-950 font-bold rounded text-xs flex items-center gap-1 hover:opacity-90 transition shrink-0`}>
                    <BrainI sz={11}/> Start
                  </button>
                  <button onClick={()=>setExpandedDomain(open ? null : d.id)}
                    className="text-slate-400 hover:text-slate-200 transition ml-1 shrink-0">
                    <ChevR sz={16} cls={`transition-transform ${open?'rotate-90':''}`}/>
                  </button>
                </div>
                {/* Sections list */}
                {open && (
                  <div className="border-t border-slate-800 bg-slate-950/50 divide-y divide-slate-800/60">

                          <div className="flex items-center gap-2 shrink-0">
                            <span className="font-mono text-[10px] text-slate-500">Q</span>
                            {countInput(sectionScope, 10)}

                          <button onClick={()=>startSectionQuiz(d, sec)}
                            className={`px-3 py-1.5 ${c.bg} ${c.tx} border ${c.bd} rounded text-xs flex items-center gap-1 hover:opacity-80 transition shrink-0`}>

                          </button>

                      );
                    })}

        <div className="border border-slate-800 bg-slate-900/40 rounded-lg p-5 space-y-5">
          <div>
            <label className="font-mono text-[10px] uppercase tracking-widest text-slate-500 block mb-3">Domains</label>
            <div className="space-y-2">
              {CURRICULUM.map(d => {
                const sel = domains.includes(d.id), c = COLORS[d.color], I = d.Icon;
                return (
                  <button key={d.id} onClick={()=>toggle(d.id)}
                    className={`w-full p-3 rounded border text-left flex items-center gap-3 transition ${sel?`${c.bd} ${c.bg}`:'border-slate-800 hover:border-slate-700'}`}>
                    <div className={`w-4 h-4 rounded border flex items-center justify-center shrink-0 transition ${sel?`${c.solid} border-transparent`:'border-slate-600'}`}>
                      {sel && <Check2 sz={12} cls="text-slate-950" sw={3}/>}
                    </div>
                    <I sz={14} cls={sel?c.tx:'text-slate-500'}/>
                    <div className="flex-1 min-w-0">
                      <span className="text-sm text-slate-100">{d.code} {d.title}</span>
                      <span className="text-xs text-slate-500 ml-2">{d.weight}%</span>
                    </div>

              })}
            </div>
          </div>

          <div>
            <label className="font-mono text-[10px] uppercase tracking-widest text-slate-500 block mb-3">Questions</label>
            <div className="flex flex-wrap gap-2 mb-3">
              {[10,20,30,50,90].map(n => (
                <button key={n} onClick={()=>setCount(n)}
                  className={`px-4 py-2 rounded text-sm font-mono transition ${count===n?'bg-emerald-500 text-slate-950 font-bold':'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}>
                  {n}{n===90?' (full)':''}
                </button>
              ))}
            </div>
            <input type="number" min="1" max={maxQuestionsFor({type:'full'})} value={count}
              onChange={e=>setCount(e.target.value)}
              className="w-28 px-3 py-2 bg-slate-950 border border-slate-700 rounded text-sm font-mono text-slate-100 focus:outline-none focus:border-emerald-500/60"
              aria-label="Custom exam question count"/>
          </div>

          <button onClick={startCustom} disabled={domains.length===0}
            className="w-full py-3 bg-slate-700 hover:bg-slate-600 disabled:bg-slate-800 disabled:text-slate-500 text-slate-100 font-bold rounded text-sm flex items-center justify-center gap-2 transition">
            <Sparkle sz={15}/> Start {count}-Question Exam
