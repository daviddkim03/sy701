        id:'2.4', title:'Indicators of Malicious Activity',
        intro:'Password SPRAYING = one password against many accounts (avoids lockout). BRUTE FORCE = many passwords against one account (triggers lockout). Impossible travel = login from NYC at 8am, London at 8:05am - high-confidence alert. Missing logs = attacker deleted evidence.',
        topics:[
          { name:'Malware Types', items:[

            'Trojan: disguised as legitimate software (game, PDF, utility); installs backdoor silently; RAT (Remote Access Trojan) gives attacker full interactive control',

            'Password spraying: try ONE common password ("Summer2024!", "Password1") against ALL accounts - avoids per-account lockout thresholds; detectable by watching for distributed failed logins',

            'Dictionary attack: try wordlist of common passwords + variations (leet-speak substitutions) against hashes - much faster than pure brute force',

            'Concurrent sessions: same account authenticated from two different IP/geo-locations simultaneously - could indicate stolen token reuse',
            'Resource consumption spike: sudden CPU/RAM/bandwidth spike with no business cause - cryptominer, DDoS participation, data exfiltration in progress',
            'Out-of-cycle logging: file access logs at 3am when no staff work - scheduled task, malware beaconing, insider stealing data',
            'Missing logs: attacker cleared event logs to cover tracks - absence of expected log entries is itself an indicator; use centralized SIEM so local deletion doesn\'t matter',

        id:'2.5', title:'Mitigation Techniques',
        intro:'Allow list is FAR more restrictive than deny list - nothing runs unless explicitly approved, including unknown malware. Least privilege limits blast radius: compromised low-privilege account can\'t reach everything.',
        topics:[
          { name:'Core Mitigations', items:[
            'Network segmentation: VLANs, subnets, DMZ, micro-segmentation - a breach in one zone can\'t reach all others; limits lateral movement',
            'Application allow list: ONLY listed executables/hashes can run - AppLocker, Windows Defender Application Control (WDAC); most effective malware prevention',
            'Least privilege: give users only minimum access needed for their role; review and trim regularly - "access creep" is when people accumulate permissions over time',

            'Patching: Microsoft Patch Tuesday = 2nd Tuesday each month; race between org patching and attacker exploiting; test in staging first',

          { name:'Hardening Techniques', items:[

            'Host-based firewall: Windows Defender Firewall, iptables/nftables on Linux - blocks at endpoint even if network perimeter is bypassed',

    sections:[
      {
        id:'3.1', title:'Architecture Models',
        intro:'IaaS: you manage OS upward (EC2). PaaS: you manage apps and data only (Heroku). SaaS: vendor manages everything (Office 365). Air-gapped = physically disconnected - only attack vector is physical access. SDN separates control plane from data plane and centralizes management.',

            'SaaS (Software as a Service): rent the complete application; provider manages everything below your data - Office 365, Salesforce, Google Workspace; you configure access/permissions',
            'Shared responsibility model: cloud provider ALWAYS owns physical security, hypervisor; customer responsibility increases as you move from SaaS→PaaS→IaaS',

            'SDN (Software-Defined Networking): control plane (routing decisions) separated from data plane (packet forwarding); centrally managed via software controller; enables rapid micro-segmentation changes',
            'IaC (Infrastructure as Code): Terraform, CloudFormation, Ansible - infrastructure defined in version-controlled code; reproducible and auditable; bugs propagate at machine speed',

      {
        id:'3.2', title:'Securing Enterprise Infrastructure',
        intro:'IDS = passive sensor, detects and logs only. IPS = inline, actively blocks. Fail-open = traffic passes on failure (availability wins). Fail-closed = traffic stops on failure (security wins). 802.1X = device must authenticate to the switch before getting ANY network access.',
        topics:[
          { name:'Device Modes & Placement', items:[
            'Inline device: sits IN the traffic path; can inspect AND block; failure causes outage - IPS, NGFW, WAF',
            'Tap/monitor port (passive): receives a COPY of traffic via SPAN/mirror port; CANNOT block; failure = blind spot, not outage - IDS sensor, packet capture',
            'Fail-open: if the device crashes, traffic passes through uninspected - availability prioritized; appropriate for non-critical monitoring',
            'Fail-closed: if the device crashes, traffic is blocked entirely - security prioritized; appropriate for security-critical inline devices',
            'Active vs passive: active device can initiate traffic, modify packets, inject TCP resets (IPS); passive device only observes (IDS)'
          ]},
          { name:'Network Appliances', items:[
            'Jump server (bastion host): the ONLY administrative entry point for internal systems; all admin connections must route through it; full audit logging; hardened and monitored',
            'Forward proxy: sits between internal clients and internet; caches, filters by category/URL, logs all requests; clients know they\'re using a proxy',
            'Reverse proxy: sits in front of servers, receives external requests; hides server IPs; used for WAF, load balancing, TLS offload; clients don\'t know it exists',
            'Load balancer: Active-Active = all nodes handling traffic simultaneously (better throughput); Active-Passive = secondary waits on standby until primary fails',
            '802.1X port-based NAC: unauthenticated device gets quarantine VLAN or no access; uses EAP (authentication protocol) between device and switch, RADIUS server makes access decision',

          { name:'Firewall Types', items:[
            'Packet filtering: stateless; checks source/dest IP and port only; fast; no application awareness; Layer 3/4',

            'UTM (Unified Threat Management): all-in-one appliance combining firewall + IPS + antivirus + web filter + VPN - common in SMBs for simplified management',
            'NGFW (Next-Generation Firewall): Layer 7 application-aware; identifies apps regardless of port (Netflix on any port); user-identity aware; TLS inspection; Palo Alto, Fortinet, Check Point',
            'Screened subnet (DMZ): internet-facing servers placed between two firewalls - outer firewall faces internet, inner firewall protects internal network'
          ]},
          { name:'Secure Communication', items:[
            'IPSec Tunnel mode: encrypts AND encapsulates the ENTIRE original packet; new IP header added; used for VPN connections between sites (hides internal addressing)',

          ]}

      {
        id:'3.3', title:'Data Protection',
        intro:'Three states: at rest (stored) → encrypt the storage. In transit (moving over network) → use TLS. In use (RAM/CPU) → secure enclaves. Data sovereignty: data is legally subject to laws of the country where it physically resides.',
        topics:[
          { name:'Data Classifications', items:[
            'Public: freely shareable; no harm if disclosed - marketing materials, press releases, published research',
            'Internal/Private: not secret but not for external distribution - internal memos, org charts, internal procedures',
            'Confidential: sensitive business info requiring access controls - customer PII, financial records, contracts, employee records',
            'Restricted/Secret: highest business sensitivity - trade secrets, M&A plans, security vulnerabilities; strict need-to-know',
            'Regulated: subject to specific compliance frameworks - PHI under HIPAA, PAN under PCI DSS, PII under GDPR; violation = significant fines'
          ]},
          { name:'Data States', items:[
            'Data at rest: stored on HDD/SSD/tape/cloud storage; encrypt with AES-256 (BitLocker, FileVault, LUKS, TDE for databases)',
            'Data in transit: moving over network; encrypt with TLS 1.2+ (HTTPS, SFTP, SMTPS, LDAPS); NEVER transmit unencrypted (no FTP, Telnet, plain SMTP for sensitive data)',
            'Data in use: actively in RAM/CPU during processing; protect with memory encryption, secure enclaves (Intel SGX, AMD SEV, Apple Secure Enclave), strict process isolation',
            'Data sovereignty: physical location of data determines which country\'s laws apply - EU data on US servers = both GDPR and US laws may apply',
            'Geolocation: some orgs restrict data access by user location (block foreign logins) or require data remain within national borders'
          ]},
          { name:'Protection Methods', items:[
            'Encryption: strongest protection; useless to attacker without the decryption key; AES-256 for at rest, TLS 1.3 for in transit',
            'Hashing: verify file/message integrity - compare SHA-256 hash before/after download to detect tampering; one-way, not for protecting confidentiality',
            'Tokenization: replace sensitive value (SSN 123-45-6789) with random token (TKN-847-20-3891) - token alone is worthless; real value in secure vault; standard for PCI DSS credit card data',
            'Data masking: display partial data (***-**-6789) in non-production environments - protects production data used in dev/test; often irreversible',
            'Geographic restrictions: block access to data from certain countries/regions; comply with data residency requirements',
            'Permission restrictions: least privilege on file/DB access; review quarterly; revoke when no longer needed; monitor for access creep'
          ]}

      {
        id:'3.4', title:'Resilience & Recovery',
        intro:'Hot site = fully operational, minutes to failover, most expensive. Warm = hardware ready, hours to bring up. Cold = just space, days/weeks. RPO = max data loss tolerated. RTO = max downtime tolerated. ALE = SLE × ARO.',
        topics:[
          { name:'Site & HA Design', items:[
            'Hot site: fully operational duplicate; real-time data replication; failover in minutes; most expensive; required for critical systems (banking, healthcare)',
            'Warm site: hardware provisioned, OS/apps installed; data restored from recent backup; hours to bring online; moderate cost; good for most enterprise use cases',
            'Cold site: space, power, and connectivity only; must procure and configure hardware; cheapest; days or weeks to bring up; only for non-critical systems with long acceptable downtime',
            'Geographic dispersion: sites far enough apart that a regional disaster (hurricane, earthquake, power grid failure) doesn\'t hit both simultaneously',
            'Platform diversity: different OS, hardware vendors, or cloud providers prevent single vendor vulnerability from taking down everything',
            'Active-Active load balancing: all nodes handle traffic; failure of one node reduces capacity but doesn\'t cause outage; provides both HA and performance'
          ]},
          { name:'Recovery Objectives', items:[
            'RTO (Recovery Time Objective): maximum acceptable time from disaster to restored operations - "we can be down at most 4 hours"; drives hot/warm/cold site choice',
            'RPO (Recovery Point Objective): maximum acceptable data loss measured in time - "we can lose at most 1 hour of transactions"; drives backup frequency; RPO=0 requires real-time replication',
            'MTTR (Mean Time To Repair): average time to FIX a failure after it\'s detected; lower = better operational efficiency',
            'MTBF (Mean Time Between Failures): average time between failures; higher = more reliable; drives hardware selection and maintenance schedules',
            'Example: RPO=4 hours → backups run every 4 hours maximum; RTO=2 hours → hot or warm site needed, not cold'
          ]},
          { name:'Backup & Recovery', items:[
            'Snapshot: point-in-time copy of VM or filesystem; fast to create; doesn\'t protect against storage failure if on same system; used for quick rollback after bad update',
            'Replication: continuous or near-continuous copy to another system/location; near-zero RPO; if data is deleted, it\'s deleted at replica too (not a ransomware defense alone)',
            'Journaling: transaction log of all changes since last backup; can replay journal to recover to any specific point in time; most granular recovery option',
            'Offsite backup: physically separate location so ransomware/fire/flood at primary site doesn\'t destroy backups; 3-2-1 rule: 3 copies, 2 different media types, 1 offsite',
            'Backup encryption: encrypt backups at rest; an unencrypted backup is a copy of your most sensitive data in a potentially less-secure location',
            'UPS (Uninterruptible Power Supply): battery backup; provides minutes of clean power for graceful shutdown or generator startup; also conditions power (removes spikes/sags)',
            'Generator: provides extended power; requires diesel/natural gas; must be tested under load monthly; fuel supply is a logistics concern during extended outages'
          ]}
        ]
      }

      {
        id:'4.3', title:'Vulnerability Management',
        intro:'CVSS 0–10: Critical 9–10, High 7–8.9, Medium 4–6.9, Low 0–3.9. CVE format: CVE-YEAR-NUMBER (CVE-2021-44228 = Log4Shell). False positive = scanner says vulnerable but you\'re not. False negative = actually vulnerable, scanner missed it - far more dangerous.',
        topics:[
          { name:'Identification Methods', items:[
            'Credentialed vulnerability scan: scanner authenticates to target - sees installed software versions, config files, missing patches; far more thorough than non-credentialed',
            'Non-credentialed scan: external view only - sees what an attacker sees from outside; misses local privilege issues',
            'SAST (Static): scan source code; integrates into CI/CD; finds issues before deployment',
            'DAST (Dynamic): scan running app; finds runtime/logic flaws; post-deployment',
            'SCA (Package monitoring): Software Composition Analysis - identifies vulnerable open-source libraries in your dependency tree (e.g., Log4j used 3 layers deep)',
            'OSINT: Shodan for internet-exposed devices; SecurityFocus; MITRE ATT&CK; CISA Known Exploited Vulnerabilities (KEV) catalog; dark web monitoring for leaked credentials',
            'Penetration testing: authorized attack to find vulnerabilities before real attackers; scope and rules of engagement must be agreed in writing first',
            'Bug bounty: pay external researchers to responsibly disclose vulns; HackerOne, Bugcrowd, Synack; define scope carefully'
          ]},
          { name:'Analysis & Prioritization', items:[
            'CVSS base score: Attack Vector (network/adjacent/local/physical) + Attack Complexity (low/high) + Privileges Required + User Interaction + Scope + CIA Impact',
            'CVE (Common Vulnerability Enumeration): unique identifier - CVE-2021-44228 (Log4Shell), CVE-2017-0144 (EternalBlue/MS17-010), CVE-2014-0160 (Heartbleed)',

            'False negative: real vulnerability missed by scanner - creates blind spot and false sense of security; more dangerous than false positive',
            'Prioritization factors: CVSS score PLUS internet-facing exposure PLUS exploit availability (is PoC code public?) PLUS asset criticality PLUS business impact',
            'Environmental score: adjust CVSS base for your environment - does a compensating control already exist? Is the vulnerable service actually running?'
          ]},
          { name:'Response & Validation', items:[
            'Patching: apply vendor patch; always test in staging first; track in change management; most complete remediation',

            'Exemption: permanent exclusion from policy - requires executive risk acceptance sign-off; review annually',
            'Rescan after remediation: do NOT just trust that the patch worked - rescan to confirm vulnerability is closed',

      {
        id:'4.4', title:'Alerting & Monitoring',
        intro:'SIEM aggregates logs from all sources, correlates events across sources, and triggers alerts. NetFlow captures connection METADATA only (who talked to whom, how long, how many bytes) - not content. DLP watches for data patterns and can BLOCK email or uploads.',
        topics:[
          { name:'SIEM & Aggregation', items:[
            'SIEM: central log repository + correlation engine + alerting + dashboards; detects patterns no single source would reveal - Splunk, IBM QRadar, Microsoft Sentinel, Elastic SIEM',

        id:'4.6', title:'Identity & Access Management',
        intro:'MAC = labels, government-grade, you can\'t change your own permissions. DAC = owner sets permissions (NTFS). RBAC = assign permissions to roles (enterprise standard). ABAC = evaluate multiple attributes simultaneously. OAuth = authorization ("Login with Google"). SAML = enterprise SSO assertion (XML). LDAP = directory protocol port 389/636.',
        topics:[
          { name:'Access Control Models', items:[
            'MAC (Mandatory Access Control): security LABELS on every subject (user) and object (file) - access allowed only if labels match; users CANNOT modify their own permissions or share above their clearance; used in government systems (Top Secret, Secret, Confidential)',
            'DAC (Discretionary Access Control): resource OWNER sets permissions at their discretion - Windows NTFS permissions, Linux file permissions; flexible but risky (owner can accidentally share with Everyone)',
            'RBAC (Role-Based Access Control): permissions assigned to ROLES; users assigned to ROLES - Admin role, Accountant role, Read-Only role; change the role, not individual users; enterprise standard for large organizations',
            'ABAC (Attribute-Based Access Control): access decision evaluates MULTIPLE attributes simultaneously - Department=Finance AND Clearance=Level3 AND Time=BusinessHours AND Device=Managed; most flexible, most complex',
            'Rule-based: access controlled by static rules (firewall ACLs, time-of-day restrictions) - NOT the same as RBAC despite similar name'
          ]},
          { name:'SSO Protocols', items:[
            'LDAP (Lightweight Directory Access Protocol): queries and modifies directory services (Active Directory, OpenLDAP); port 389 (plaintext - vulnerable to sniffing!); port 636 (LDAPS = LDAP over TLS - use this)',
            'OAuth 2.0: AUTHORIZATION framework, not authentication - provides access tokens so third-party app can access your data without knowing your password; "Login with Google" scenario; cannot authenticate identities on its own',
            'OIDC (OpenID Connect): authentication layer built on top of OAuth 2.0 - adds ID token (JWT) that contains user identity; modern standard for "Login with [provider]"',
            'SAML (Security Assertion Markup Language): XML-based; enterprise SSO; Identity Provider (IdP) authenticates user → sends signed XML assertion to Service Provider (SP) → SP grants access based on assertion; common in enterprise app federation',
            'Federation: link identity systems ACROSS organizations - user authenticated by Org A\'s IdP can access Org B\'s resources without separate credentials'
          ]},
          { name:'MFA Factors', items:[
            'Something you KNOW: password, PIN, security question answers - weakest factor alone; can be stolen via phishing, keylogger, data breach, or shoulder surfing',
            'Something you HAVE: smartphone (authenticator app - TOTP), hardware token (YubiKey, RSA SecurID), smart card (PIV/CAC), push notification - requires physical possession of device',
            'Something you ARE: biometrics - fingerprint, iris scan, facial recognition, voice print - hardest to steal; FAR (False Acceptance Rate) vs FRR (False Rejection Rate) tradeoff',

            'TOTP (Time-based OTP): 6-digit code generated from shared secret + current UNIX time; changes every 30 seconds - Google Authenticator, Authy, Microsoft Authenticator',

        intro:'NIST 800-61 order: Preparation → Detection & Analysis → Containment → Eradication → Recovery → Lessons Learned. CONTAINMENT before ERADICATION - stop the spread first. Order of volatility: collect most volatile evidence FIRST (CPU registers → RAM → network state → disk).',

            'Root cause analysis: 5 Whys methodology - find the ORIGINAL cause, not just the symptom; "server was breached" → why → "unpatched Apache" → why → "no patch management process" → fix the root cause',

        intro:'Document hierarchy: Policy (mandatory, "what must be") → Standard (specific, measurable "how much/which") → Procedure (step-by-step "how to do it") → Guideline (recommendation, optional). Data owner = business executive who classifies and owns risk. Custodian = IT who implements controls.',

        id:'5.2', title:'Risk Management',
        intro:'Quantitative risk formula: SLE = Asset Value × Exposure Factor. ALE = SLE × ARO. Qualitative uses High/Medium/Low scales. Risk strategies: Transfer (insurance/outsource), Accept (document it), Avoid (stop doing the risky activity), Mitigate (implement controls).',
        topics:[
          { name:'Risk Formulas', items:[
            'SLE (Single Loss Expectancy): expected dollar loss from ONE occurrence - SLE = Asset Value × Exposure Factor; Example: Server worth $100K, flood destroys 40% → SLE = $40,000',
            'ARO (Annualized Rate of Occurrence): expected frequency per year - ARO = 0.1 means once every 10 years; ARO = 2 means twice per year; ARO = 0.5 means once every 2 years',
            'ALE (Annualized Loss Expectancy): expected annual cost of a risk - ALE = SLE × ARO; Example: SLE=$40,000 × ARO=0.5 = ALE=$20,000/year; if a control costs <$20K/year, it\'s worth implementing',
            'Exposure factor: percentage of asset lost per incident (0.0 to 1.0); fire in server room might destroy 100% (EF=1.0); flood might damage 40% (EF=0.4)',
            'Qualitative analysis: high/medium/low likelihood × impact matrix; no dollar amounts; faster; used when numerical data unavailable; still useful for prioritization'
          ]},
          { name:'Risk Strategies', items:[
            'Risk transfer: shift financial consequence to another party - purchase cyber insurance; outsource function to vendor who assumes liability; risk still exists but impact is transferred',
            'Risk acceptance: formally document and accept the residual risk - signed by executive with risk ownership; required when cost of mitigation > cost of loss; includes exemptions and exceptions',
            'Risk avoidance: stop doing the risky activity entirely - don\'t store credit card numbers (outsource to payment processor); don\'t operate in high-risk regions; eliminates the risk',
            'Risk mitigation: implement controls to REDUCE likelihood or impact - patching, encryption, MFA, segmentation; most common strategy; doesn\'t eliminate risk, reduces it to acceptable level',
            'Exemption: formal approval to NOT follow a policy for a specific system/use case; permanent deviation; must be signed off at appropriate level; reviewed annually',

        id:'5.3', title:'Third-Party Risk',
        intro:'Vendors extend your attack surface. Right-to-audit clause in contracts gives you legal ability to audit their security. SLA = measurable performance guarantees. MOU = intent without legal force. MSA = umbrella; SOW = specific deliverables. NDA = confidentiality.',

          { name:'Assessment & Selection', items:[

function sectionsForScope(scope) {
  if (!scope || scope.type === 'full') return CURRICULUM.flatMap(d => d.sections.map(section => ({domain:d, section})));
  if (scope.type === 'domain') return scope.domain.sections.map(section => ({domain:scope.domain, section}));
  if (scope.type === 'section') return [{domain:scope.domain, section:scope.section}];
  return [];
}

function makeFlashcards(scope) {
  return sectionsForScope(scope).flatMap(({domain, section}) =>
    section.topics.flatMap(topic =>
      topic.items.map((item, idx) => {
        const splitAt = item.indexOf(':');
        const hasTerm = splitAt > 0 && splitAt < 72;
        return {
          id: `${section.id}-${topic.name}-${idx}`,
          domain,
          section,
          topic: topic.name,
          front: hasTerm ? item.slice(0, splitAt).trim() : topic.name,
          back: hasTerm ? item.slice(splitAt + 1).trim() : item,
          source: `§${section.id} ${section.title}`
        };
      })
    )
  );
}
