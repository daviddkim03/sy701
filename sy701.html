        </div>
      )}
    </div>
  );
}

function FlashcardsView({ scope, setView }) {
  const initialScope = scope || {type:'full'};
  const [activeScope, setActiveScope] = useState(initialScope);
  const [cards, setCards] = useState(() => makeFlashcards(initialScope));
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [known, setKnown] = useState({});

  useEffect(() => {
    const nextScope = scope || {type:'full'};
    setActiveScope(nextScope);
    setCards(makeFlashcards(nextScope));
    setIdx(0);
    setFlipped(false);
    setKnown({});
  }, [scope]);

  const title = activeScope.type==='section' ? `§${activeScope.section.id} ${activeScope.section.title}` :
    activeScope.type==='domain' ? `Domain ${activeScope.domain.code}: ${activeScope.domain.title}` : 'Full SY0-701 Deck';
  const card = cards[idx];
  const knownCount = cards.filter(c => known[c.id]).length;

  const chooseScope = nextScope => {
    const nextCards = makeFlashcards(nextScope);
    setActiveScope(nextScope);
    setCards(nextCards);
    setIdx(0);
    setFlipped(false);
    setKnown({});
  };

  const go = nextIdx => {
    setIdx(Math.max(0, Math.min(cards.length - 1, nextIdx)));
    setFlipped(false);
  };

  const shuffle = () => {
    const shuffled = [...cards].sort(() => Math.random() - 0.5);
    setCards(shuffled);
    setIdx(0);
    setFlipped(false);
  };

  if (!card) return null;

  return (
    <div className="max-w-4xl mx-auto px-4 py-8 space-y-5">
      <div>
        <div className="font-mono text-[10px] tracking-[0.3em] text-emerald-400/70 mb-2">// FLASHCARDS</div>
        <h1 className="text-3xl font-bold text-slate-100">Study Cards</h1>
        <p className="text-slate-400 mt-1 text-sm">Review the same notes as quick term-and-definition cards. No API key required.</p>
      </div>

      <div className="border border-slate-800 bg-slate-900/40 rounded-lg p-4 space-y-4">
        <div className="grid sm:grid-cols-3 gap-2">
          <button onClick={()=>chooseScope({type:'full'})}
            className={`p-3 rounded border text-left transition ${activeScope.type==='full'?'border-emerald-500/50 bg-emerald-500/10':'border-slate-800 hover:border-slate-600'}`}>
            <div className="font-mono text-[10px] text-emerald-400 tracking-wider">ALL</div>
            <div className="text-sm font-semibold text-slate-100">Full Deck</div>
          </button>
          {CURRICULUM.map(d => {
            const c = COLORS[d.color], selected = activeScope.type==='domain' && activeScope.domain.id===d.id;
            return (
              <button key={d.id} onClick={()=>chooseScope({type:'domain',domain:d})}
                className={`p-3 rounded border text-left transition ${selected?`${c.bd} ${c.bg}`:'border-slate-800 hover:border-slate-600'}`}>
                <div className={`font-mono text-[10px] ${c.tx} tracking-wider`}>{d.code}</div>
                <div className="text-sm font-semibold text-slate-100 truncate">{d.title}</div>
              </button>
            );
          })}
        </div>

        {activeScope.type==='domain' && (
          <div className="pt-3 border-t border-slate-800">
            <div className="font-mono text-[10px] uppercase tracking-widest text-slate-500 mb-2">Sections</div>
            <div className="flex flex-wrap gap-2">
              {activeScope.domain.sections.map(sec => {
                const c = COLORS[activeScope.domain.color];
                return (
                  <button key={sec.id} onClick={()=>chooseScope({type:'section',domain:activeScope.domain,section:sec})}
                    className={`px-3 py-1.5 ${c.bg} ${c.tx} border ${c.bd} rounded text-xs transition hover:opacity-80`}>
                    §{sec.id} {sec.title}
                  </button>
                );
              })}
            </div>
          </div>
        )}
      </div>

      <div className="flex items-center justify-between gap-3 flex-wrap">
        <div>
          <div className="font-mono text-[10px] text-slate-500 uppercase tracking-widest">{title}</div>
          <div className="text-sm text-slate-400">Card {idx+1} of {cards.length} · {knownCount} marked known</div>
        </div>
        <div className="flex gap-2">
          <button onClick={shuffle} className="px-3 py-2 border border-slate-700 hover:border-slate-500 text-slate-200 rounded text-xs flex items-center gap-1.5 transition">
            <RotateCw sz={13}/> Shuffle
          </button>
          <button onClick={()=>setView({name:'exam-builder'})} className="px-3 py-2 border border-slate-700 hover:border-emerald-500/50 text-slate-200 rounded text-xs flex items-center gap-1.5 transition">
            <Zap sz={13}/> Quiz
          </button>
        </div>
      </div>

      <button onClick={()=>setFlipped(!flipped)}
        className="w-full min-h-[320px] rounded-xl border border-slate-700 bg-slate-900/70 hover:border-emerald-500/40 transition p-6 sm:p-8 text-left">
        <div className="flex items-center justify-between gap-3 mb-8">
          <div className="font-mono text-[10px] text-slate-500 uppercase tracking-widest">{card.source} · {card.topic}</div>
          <div className={`font-mono text-[10px] px-2 py-1 rounded ${known[card.id]?'bg-emerald-500/15 text-emerald-400':'bg-slate-800 text-slate-500'}`}>
            {known[card.id] ? 'KNOWN' : 'TAP TO FLIP'}
          </div>
        </div>
        {!flipped ? (
          <div>
            <div className="font-mono text-xs text-emerald-400 uppercase tracking-widest mb-4">Definition</div>
            <div className="text-xl sm:text-2xl text-slate-100 leading-relaxed">{card.back}</div>
          </div>
        ) : (
          <div>
            <div className="font-mono text-xs text-emerald-400 uppercase tracking-widest mb-4">Term</div>
            <div className="text-3xl sm:text-4xl font-extrabold text-slate-100 leading-tight">{card.front}</div>
          </div>
        )}
      </button>

      <div className="flex items-center justify-between">
        <button onClick={()=>go(idx-1)} disabled={idx===0}
          className="px-4 py-2 border border-slate-700 hover:border-slate-500 disabled:opacity-30 text-slate-200 rounded text-sm flex items-center gap-1 transition">
          <ChevL sz={14}/> Prev
        </button>
        <button onClick={()=>setKnown({...known,[card.id]:!known[card.id]})}
          className={`px-4 py-2 rounded text-sm flex items-center gap-1.5 transition ${known[card.id]?'bg-emerald-500 text-slate-950 font-bold':'border border-slate-700 hover:border-emerald-500/50 text-slate-200'}`}>
          <Check2 sz={14}/> {known[card.id]?'Known':'Mark Known'}
        </button>
        <button onClick={()=>go(idx+1)} disabled={idx===cards.length-1}
          className="px-4 py-2 bg-slate-800 hover:bg-slate-700 disabled:opacity-30 text-slate-200 rounded text-sm flex items-center gap-1 transition">
          Next <ChevR sz={14}/>
        </button>
      </div>
    </div>
  );
}

function ExamView({ scope, count, setView, onComplete }) {
  const [qs] = useState(() => pickFromPool(scope, count));
  const [answers, setAnswers] = useState({});
  const [checked, setChecked] = useState({});
  const [idx, setIdx] = useState(0);
  const [submitted, setSubmitted] = useState(false);

  const title = scope.type==='section' ? `Quiz: §${scope.section.id} ${scope.section.title}` :
    scope.type==='domain' ? `Domain ${scope.domain.code} Exam` : 'Full Practice Exam';

  if (!qs.length) return (
    <div className="flex flex-col items-center justify-center min-h-[60vh] gap-4 text-center px-4">
      <XCirc sz={40} cls="text-red-400"/>
      <h2 className="text-xl font-semibold text-slate-100">No questions available</h2>
      <p className="text-slate-400 text-sm max-w-md">The question pool for this scope is empty.</p>
      <button onClick={()=>setView({name:'exam-builder'})} className="px-5 py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-200 rounded text-sm transition">
        Back to Builder
      </button>
    </div>
  );

  if (submitted) {
    const correct = qs.reduce((a,q,i)=>answers[i]===q.correct?a+1:a,0);
    const pct = Math.round(correct/qs.length*100);
    const pass = pct>=75;
    return (
      <div className="max-w-3xl mx-auto px-4 py-8 space-y-5">
        <div className={`p-6 rounded-lg border text-center ${pass?'border-emerald-500/40 bg-emerald-500/10':'border-amber-500/40 bg-amber-500/10'}`}>
          <div className={`font-mono text-[10px] tracking-[0.3em] mb-2 ${pass?'text-emerald-400':'text-amber-400'}`}>// EXAM COMPLETE</div>
          <div className="text-5xl font-extrabold text-slate-100 mb-1">{pct}%</div>
          <p className="text-slate-300 text-sm">{correct}/{qs.length} correct</p>
          <p className={`text-xs mt-1 ${pass?'text-emerald-400':'text-amber-400'}`}>{pass?'✓ Passing range!':'Below 75% - review explanations below'}</p>
          <div className="flex gap-2 justify-center mt-5">
            <button onClick={()=>setView({name:'exam-builder'})} className="px-4 py-2 bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold rounded text-sm transition">New Exam</button>
            <button onClick={()=>setView({name:'dashboard'})} className="px-4 py-2 border border-slate-700 hover:border-slate-500 text-slate-200 rounded text-sm transition">Dashboard</button>
          </div>
        </div>

        <h2 className="font-mono text-xs uppercase tracking-widest text-slate-500">Review All Questions</h2>
        {qs.map((q,i) => {
          const ok = answers[i]===q.correct;
          return (
            <div key={i} className={`border rounded-lg p-4 ${ok?'border-emerald-500/30 bg-emerald-500/5':'border-red-500/30 bg-red-500/5'}`}>
              <div className="flex gap-2 mb-3">
                {ok ? <Check2 sz={16} cls="text-emerald-400 shrink-0 mt-0.5"/> : <XCirc sz={16} cls="text-red-400 shrink-0 mt-0.5"/>}
                <div>
                  <div className="font-mono text-[10px] text-slate-500 mb-1">Q{i+1} · {q.topic||'General'}</div>
                  <p className="text-sm text-slate-100">{q.question}</p>
                </div>
              </div>
              <div className="ml-6 space-y-1.5 mb-3">
                {q.options.map((opt,j) => (
                  <div key={j} className={`text-xs p-2 rounded flex gap-2 ${j===q.correct?'bg-emerald-500/15 text-emerald-100':j===answers[i]?'bg-red-500/15 text-red-100':'text-slate-400'}`}>
                    <span className="font-mono shrink-0">{String.fromCharCode(65+j)}.</span>
                    <span className="flex-1">{opt}</span>
                    {j===q.correct && <span className="font-mono text-[10px] shrink-0">✓</span>}
                    {j===answers[i]&&j!==q.correct && <span className="font-mono text-[10px] shrink-0">✗</span>}
                  </div>
                ))}
              </div>
              <div className="ml-6 p-3 bg-slate-900/60 border border-slate-800 rounded text-xs text-slate-300">
                <span className="font-mono text-emerald-400 text-[10px]">EXPLANATION · </span>{q.explanation}
              </div>
            </div>
          );
        })}
      </div>
    );
  }

  const q = qs[idx];
  const hasAnswer = answers[idx] !== undefined;
  const isChecked = checked[idx];
  const currentCorrect = hasAnswer && answers[idx] === q.correct;
  return (
    <div className="max-w-3xl mx-auto px-4 py-8 space-y-5">
      <div className="flex items-center justify-between">
        <div>
          <div className="font-mono text-[10px] text-emerald-400/70 tracking-wider">{title.toUpperCase()}</div>
          <div className="text-sm text-slate-400">Question {idx+1} of {qs.length}</div>
        </div>
        <button onClick={()=>{ if(confirm('Exit exam? Progress will be lost.')) setView({name:'exam-builder'}); }}
          className="text-slate-500 hover:text-slate-300"><X sz={18}/></button>
      </div>

      <div className="space-y-2">
        <div className="h-1 bg-slate-800 rounded-full overflow-hidden">
          <div className="h-full bg-emerald-500 transition-all" style={{width:`${((idx+1)/qs.length)*100}%`}}/>
        </div>
        <div className="flex flex-wrap gap-1">
          {qs.map((_,i) => (
            <button key={i} onClick={()=>setIdx(i)}
              className={`w-7 h-7 rounded text-[10px] font-mono transition ${
                i===idx ? 'bg-emerald-500 text-slate-950 font-bold' :
                checked[i] ? (answers[i]===qs[i].correct ? 'bg-emerald-500/20 border border-emerald-500/40 text-emerald-300' : 'bg-red-500/20 border border-red-500/40 text-red-300') :
                answers[i]!==undefined ? 'bg-slate-700 text-slate-200' :
                'bg-slate-900 border border-slate-800 text-slate-500 hover:border-slate-600'
              }`}>
              {i+1}
            </button>
          ))}
        </div>
      </div>

      <div className="border border-slate-800 bg-slate-900/40 rounded-lg p-5 space-y-4">
        <div>
          <div className="font-mono text-[10px] text-slate-500 mb-2">{q.topic||'General'}</div>
          <p className="text-slate-100 leading-relaxed">{q.question}</p>
        </div>
        <div className="space-y-2">
          {q.options.map((opt,j) => (
            <button key={j} onClick={()=>!isChecked && setAnswers({...answers,[idx]:j})} disabled={isChecked}
              className={`w-full text-left p-3 rounded border text-sm flex gap-3 transition ${
                isChecked && j===q.correct ? 'border-emerald-500/60 bg-emerald-500/15' :
                isChecked && answers[idx]===j ? 'border-red-500/60 bg-red-500/15' :
                answers[idx]===j ? 'border-emerald-500/60 bg-emerald-500/10' :
                'border-slate-800 hover:border-slate-600'
              }`}>
              <div className={`w-6 h-6 rounded border font-mono text-xs flex items-center justify-center shrink-0 transition ${
                isChecked && j===q.correct ? 'bg-emerald-500 border-transparent text-slate-950 font-bold' :
                isChecked && answers[idx]===j ? 'bg-red-500 border-transparent text-slate-950 font-bold' :
                answers[idx]===j ? 'bg-emerald-500 border-transparent text-slate-950 font-bold' :
                'border-slate-600 text-slate-400'
              }`}>
                {String.fromCharCode(65+j)}
              </div>
              <span className="text-slate-200 flex-1">{opt}</span>
              {isChecked && j===q.correct && <span className="font-mono text-[10px] text-emerald-300 shrink-0">CORRECT</span>}
              {isChecked && answers[idx]===j && j!==q.correct && <span className="font-mono text-[10px] text-red-300 shrink-0">YOUR PICK</span>}
            </button>
          ))}
        </div>
        {isChecked && (
          <div className={`p-3 rounded border text-sm ${currentCorrect?'border-emerald-500/30 bg-emerald-500/10':'border-red-500/30 bg-red-500/10'}`}>
            <div className={`font-mono text-[10px] uppercase tracking-widest mb-1 ${currentCorrect?'text-emerald-400':'text-red-400'}`}>
              {currentCorrect ? 'Correct' : 'Incorrect'}
            </div>
            <p className="text-xs text-slate-300">{q.explanation}</p>
          </div>
        )}
      </div>

      <div className="flex items-center justify-between gap-3 flex-wrap">
        <button onClick={()=>setIdx(Math.max(0,idx-1))} disabled={idx===0}
          className="px-4 py-2 border border-slate-700 hover:border-slate-500 disabled:opacity-30 text-slate-200 rounded text-sm flex items-center gap-1 transition">
          <ChevL sz={14}/> Prev
        </button>
        <button onClick={()=>setChecked({...checked,[idx]:true})} disabled={!hasAnswer || isChecked}
          className="px-4 py-2 border border-slate-700 hover:border-emerald-500/50 disabled:opacity-30 text-slate-200 rounded text-sm flex items-center gap-1.5 transition">
          <Check2 sz={14}/> Check Answer
        </button>
        {idx < qs.length-1 ? (
          <button onClick={()=>setIdx(idx+1)} className="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-200 rounded text-sm flex items-center gap-1 transition">
            Next <ChevR sz={14}/>
          </button>
        ) : (
          <button onClick={()=>{
            const unanswered = qs.length - Object.keys(answers).length;
            if (unanswered > 0 && !confirm(`${unanswered} unanswered. Submit anyway?`)) return;
            setSubmitted(true);
            const correct = qs.reduce((a,q,i)=>answers[i]===q.correct?a+1:a,0);
            onComplete({total:qs.length,correct});
          }} className="px-5 py-2 bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold rounded text-sm flex items-center gap-1.5 transition">
            <Check2 sz={14}/> Submit
          </button>
        )}
      </div>
    </div>
  );
}

function StatsView({ stats, progress, setView, resetAll }) {
  const done = Object.values(progress).filter(p=>p.completed).length;
  const total = CURRICULUM.reduce((a,d)=>a+d.sections.length,0);
  const acc = stats.totalQuestions>0 ? Math.round(stats.totalCorrect/stats.totalQuestions*100) : 0;

  return (
    <div className="max-w-3xl mx-auto px-4 py-8 space-y-6">
      <div>
        <div className="font-mono text-[10px] tracking-[0.3em] text-emerald-400/70 mb-2">// STATISTICS</div>
        <h1 className="text-3xl font-bold text-slate-100">Your Progress</h1>
      </div>

      <div className="grid grid-cols-2 gap-3">
        <StatCard label="Sections" value={`${done}/${total}`} sub={`${Math.round(done/total*100)}%`} I={Target}/>
        <StatCard label="Exams" value={stats.examsCompleted} sub="completed" I={Award}/>
        <StatCard label="Questions" value={stats.totalQuestions} sub={`${stats.totalCorrect} correct`} I={FileText}/>
        <StatCard label="Accuracy" value={`${acc}%`} sub="all exams" I={Trophy}/>
      </div>

      <div className="border border-slate-800 bg-slate-900/40 rounded-lg p-5">
        <h2 className="font-semibold text-slate-100 mb-4 text-sm flex items-center gap-2"><Layers sz={14} cls="text-emerald-400"/> Domain Progress</h2>
        <div className="space-y-3">
          {CURRICULUM.map(d => {
            const c = COLORS[d.color];
            const dDone = d.sections.filter(s=>progress[s.id]?.completed).length;
            const dPct = Math.round(dDone/d.sections.length*100);
            return (
              <div key={d.id}>
                <div className="flex justify-between text-xs mb-1">
                  <span className="text-slate-300"><span className={`font-mono ${c.tx}`}>{d.code}</span> {d.title}</span>
                  <span className="font-mono text-slate-500">{dDone}/{d.sections.length}</span>
                </div>
                <div className="h-1.5 bg-slate-800 rounded-full overflow-hidden">
                  <div className={`h-full ${c.solid} transition-all`} style={{width:`${dPct}%`}}/>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {stats.history?.length > 0 && (
        <div className="border border-slate-800 bg-slate-900/40 rounded-lg p-5">
          <h2 className="font-semibold text-slate-100 mb-4 text-sm flex items-center gap-2"><Flame sz={14} cls="text-amber-400"/> Recent Exams</h2>
          <div className="space-y-1.5">
            {stats.history.slice(-10).reverse().map((h,i) => (
              <div key={i} className="flex items-center justify-between p-2 bg-slate-900/40 rounded text-xs">
                <span className="text-slate-400 font-mono">{new Date(h.date).toLocaleString()}</span>
                <span className={`font-mono px-2 py-0.5 rounded ${h.pct>=75?'bg-emerald-500/20 text-emerald-400':'bg-amber-500/20 text-amber-400'}`}>{h.correct}/{h.total} · {h.pct}%</span>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="border border-red-900/40 bg-red-950/10 rounded-lg p-5">
        <h2 className="font-semibold text-slate-100 mb-1 text-sm flex items-center gap-2"><Trash sz={14} cls="text-red-400"/> Reset</h2>
        <p className="text-xs text-slate-400 mb-3">Delete all progress and exam history. Cannot be undone.</p>
        <button onClick={()=>{ if(confirm('Reset everything? This cannot be undone.')) resetAll(); }}
          className="px-4 py-2 bg-red-500/15 border border-red-500/30 hover:bg-red-500/25 text-red-300 rounded text-sm transition">
          Reset All Progress
        </button>
      </div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState({ name:'dashboard' });
  const [history, setHistory] = useState([]);
  const [progress, setProgress] = useState(() => store.get('secplus:progress', {}));
  const [stats, setStats] = useState(() => store.get('secplus:stats', {examsCompleted:0,totalQuestions:0,totalCorrect:0,history:[]}));

  const toggleSection = id => {
    const updated = {...progress, [id]:{completed:!progress[id]?.completed,at:Date.now()}};
    setProgress(updated); store.set('secplus:progress', updated);
  };

  const onExamComplete = ({total,correct}) => {
    const pct = Math.round(correct/total*100);
    const updated = {
      examsCompleted: stats.examsCompleted+1,
      totalQuestions: stats.totalQuestions+total,
      totalCorrect: stats.totalCorrect+correct,
      history: [...(stats.history||[]),{date:Date.now(),total,correct,pct}].slice(-50)
    };
    setStats(updated); store.set('secplus:stats', updated);
  };

  const resetAll = () => {
    const empty = {examsCompleted:0,totalQuestions:0,totalCorrect:0,history:[]};
    setProgress({}); setStats(empty);
    store.set('secplus:progress',{}); store.set('secplus:stats',empty);
    setHistory([]);
    setView({name:'dashboard'});
  };

  const viewKey = (v) => {
    if (!v) return '';
    if (v.name === 'domain') return `domain:${v.domainId}`;
    if (v.name === 'section') return `section:${v.domainId}:${v.sectionId}`;
    return v.name;
  };

  const sv = (v) => {
    if (viewKey(v) !== viewKey(view)) setHistory(h => [...h, view]);
    setView(v);
    window.scrollTo(0,0);
  };

  const goBack = () => {
    if (history.length === 0) return;
    const prev = history[history.length - 1];
    setHistory(h => h.slice(0, -1));
    setView(prev);
  };

  return (
    <div className="min-h-screen bg-slate-950 text-slate-100">
      <Header view={view} setView={sv} goBack={goBack} canGoBack={history.length > 0}/>
      <main className="pb-16">
        {view.name==='dashboard'    && <Dashboard progress={progress} stats={stats} setView={sv}/>}
        {view.name==='curriculum'   && <CurriculumView progress={progress} setView={sv}/>}
        {view.name==='domain'       && <DomainView domainId={view.domainId} progress={progress} setView={sv} toggleSection={toggleSection}/>}
        {view.name==='section'      && <SectionView domainId={view.domainId} sectionId={view.sectionId} progress={progress} setView={sv} toggleSection={toggleSection}/>}
        {view.name==='flashcards'   && <FlashcardsView scope={view.scope} setView={sv}/>}
        {view.name==='exam-builder' && <ExamBuilder setView={sv}/>}
        {view.name==='exam'         && <ExamView scope={view.scope} count={view.count} setView={sv} onComplete={onExamComplete}/>}
        {view.name==='stats'        && <StatsView stats={stats} progress={progress} setView={sv} resetAll={resetAll}/>}
      </main>
      <footer className="border-t border-slate-900 py-5 text-center font-mono text-[10px] text-slate-600">
        SY0-701 STUDY PLATFORM · OPEN DIRECTLY IN ANY BROWSER · NOT AFFILIATED WITH COMPTIA
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
